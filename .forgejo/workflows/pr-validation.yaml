name: PR Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31.10.6

      - name: Run validation (includes Renovate audit)
        run: nix develop -c just validate
