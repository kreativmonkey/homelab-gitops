apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-sources
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/base/sources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-storage
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-sources
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/base/storage
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-base
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-storage
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-backup-schedules
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-base
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/base/backup-schedules
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: velero
      namespace: velero
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-main
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: infra-base
  path: ./infrastructure/overlays/disaster-recovery
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # ACME DNS-01 (wildcard-f4mily-net) can stay InProgress for a long time after DR; do not block apps.
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  force: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-network-policies
  namespace: flux-system
spec:
  # Isolated from infra-base so the NetworkPolicy pilot can be rolled back with a
  # single `flux suspend kustomization infra-network-policies`. Phase 1 only
  # covers self-contained namespaces; extend via the network-policies overlay.
  dependsOn:
    - name: infra-base
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  path: ./infrastructure/base/network/network-policies
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
