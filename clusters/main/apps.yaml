apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: infra-main
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/overlays/main
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
