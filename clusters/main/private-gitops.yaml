apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-gitops-public
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/kreativmonkey/homelab-gitops.git
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-gitops-private-composed
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://github.com/kreativmonkey/homelab-gitops-private.git
  include:
    - repository:
        name: homelab-gitops-public
      fromPath: apps/base
      toPath: vendor/public/apps/base
    - repository:
        name: homelab-gitops-public
      fromPath: infrastructure/base
      toPath: vendor/public/infrastructure/base
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: private-infrastructure
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./infrastructure/overlays/main
  prune: false
  sourceRef:
    kind: GitRepository
    name: homelab-gitops-private-composed
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: private-apps
  namespace: flux-system
spec:
  dependsOn:
    - name: private-infrastructure
  interval: 10m
  retryInterval: 1m
  path: ./apps/overlays/main
  prune: false
  sourceRef:
    kind: GitRepository
    name: homelab-gitops-private-composed
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
