apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-sources
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/seurces
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true 
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-storage
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-sources
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/sources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true 
  timeout: 5m 
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-base
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-storage
  interval: 1h
  retryInterval: 1m
  path: ./infrastructure/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true 
  timeout: 5m 
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: infra-base
  path: ./infrastructure/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true