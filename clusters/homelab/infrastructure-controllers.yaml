apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/controllers # Zeigt auf Ingress, Cert-Manager, Longhorn
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system