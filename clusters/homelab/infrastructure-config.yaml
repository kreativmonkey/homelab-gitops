apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/config # Zeigt auf PriorityClass, Secrets, ClusterIssuer
  prune: true
  dependsOn:
    - name: infrastructure-controllers # Zwingende Wartebedingung
  sourceRef:
    kind: GitRepository
    name: flux-system