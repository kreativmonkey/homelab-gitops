# apps/monitoring/victoria-metrics/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.33.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-repo
        namespace: flux-system
  values:
    server:
      fullnameOverride: victoria-metrics-single

      # Persistence: Wir binden das oben erstellte PVC an
      persistentVolume:
        enabled: true
        existingClaim: vm-data-victoria-metrics-single-0

      # Security Context
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # Container Security Context
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      # Resources (INCREASED for bundled components)
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: "1000m"
          memory: 2Gi

      # Ingress: Disabled - use separate ingress resource
      ingress:
        enabled: false

      # Backup: Velero Annotation für Filesystem-Backups (falls kein Snapshot-FS)
      podAnnotations:
        backup.velero.io/backup-volumes: server-volume

      # Extra Args für Performance & Retention
      extraArgs:
        retentionPeriod: "1"

      # Priority Class
      priorityClassName: "homelab-infrastructure"

      # ============================================
      # BUNDLED SCRAPING (replaces vmagent)
      # ============================================
      scrape:
        enabled: true
        config:
          global:
            scrape_interval: 30s
            evaluation_interval: 30s
          scrape_configs:
            # Kubernetes API Servers
            - job_name: kubernetes-apiservers
              kubernetes_sd_configs:
                - role: endpoints
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_namespace
                    - __meta_kubernetes_service_name
                    - __meta_kubernetes_endpoint_port_name
                  action: keep
                  regex: default;kubernetes;https

            # Kubernetes Nodes
            - job_name: kubernetes-nodes
              kubernetes_sd_configs:
                - role: node
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)

            # cAdvisor
            - job_name: kubernetes-nodes-cadvisor
              kubernetes_sd_configs:
                - role: node
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              metrics_path: /metrics/cadvisor
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - source_labels:
                    - __metrics_path__
                  target_label: metrics_path
              metric_relabel_configs:
                - action: replace
                  source_labels:
                      - pod
                  regex: '(.+)'
                  target_label: pod_name
                  replacement: '${1}'
                - action: replace
                  source_labels:
                      - container
                  regex: '(.+)'
                  target_label: container_name
                  replacement: '${1}'
                - action: replace
                  target_label: name
                  replacement: k8s_stub
                - action: replace
                  source_labels:
                      - id
                  regex: '^/system\.slice/(.+)\.service$'
                  target_label: systemd_service_name
                  replacement: '${1}'

            # Kubernetes Pods (prometheus.io/scrape annotation)
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                  action: keep
                  regex: "true"
                - source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels:
                    - __address__
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels:
                    - __meta_kubernetes_namespace
                  action: replace
                  target_label: kubernetes_namespace
                - source_labels:
                    - __meta_kubernetes_pod_name
                  action: replace
                  target_label: kubernetes_pod_name

            # Kubernetes Service Endpoints
            - job_name: kubernetes-service-endpoints
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_service_annotation_prometheus_io_scrape
                  action: keep
                  regex: "true"
                - source_labels:
                    - __meta_kubernetes_service_annotation_prometheus_io_scheme
                  action: replace
                  target_label: __scheme__
                  regex: (https?)
                - source_labels:
                    - __meta_kubernetes_service_annotation_prometheus_io_path
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels:
                    - __address__
                    - __meta_kubernetes_service_annotation_prometheus_io_port
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_service_label_(.+)
                - source_labels:
                    - __meta_kubernetes_namespace
                  action: replace
                  target_label: kubernetes_namespace
                - source_labels:
                    - __meta_kubernetes_service_name
                  action: replace
                  target_label: kubernetes_name

            # VictoriaMetrics self-monitoring
            - job_name: victoriametrics
              static_configs:
                - targets:
                    - "localhost:8428"

      # ============================================
      # BUNDLED ALERTING (replaces vmalert)
      # ============================================
      vmalert:
        enabled: true
        configMap:
          name: vmalert-rules
        datasource:
          url: "http://victoria-metrics-single:8428"
        remoteWriteURL: "http://victoria-metrics-single:8428/api/v1/write"
        alertmanager:
          url: ""
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        podSecurityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
        containerSecurityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
