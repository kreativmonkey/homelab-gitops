# apps/monitoring/victoria-metrics/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.33.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-repo
        namespace: flux-system
  values:
    server:
      fullnameOverride: victoria-metrics-single
      
      # Persistence: Wir binden das oben erstellte PVC an
      persistentVolume:
        enabled: true
        existingClaim: vm-data-victoria-metrics-single-0

      # Best Practices: Security Context
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # Best Practices: Resources
      resources:
        limits:
          cpu: "1"
          memory: 2Gi
        requests:
          cpu: "500m"
          memory: 1Gi

      # Ingress: Disabled - use separate ingress resource
      ingress:
        enabled: false

      # Backup: Velero Annotation für Filesystem-Backups (falls kein Snapshot-FS)
      podAnnotations:
        backup.velero.io/backup-volumes: server-volume

      # Extra Args für Performance & Retention
      extraArgs:
        retentionPeriod: "1" # 1 Monat Aufbewahrung