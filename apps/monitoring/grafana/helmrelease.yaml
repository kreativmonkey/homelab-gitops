# apps/monitoring/grafana/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/monitoring/victoria-metrics
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: "8.15.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-repo
        namespace: flux-system
  values:
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-username
      passwordKey: admin-password

    # Security Context
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    # Extra volume mounts needed for readOnlyRootFilesystem + plugin installer
    extraVolumes:
      - name: tmp
        emptyDir: {}
      - name: plugins-dir
        emptyDir: {}

    extraVolumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: plugins-dir
        mountPath: /var/lib/grafana/plugins

    # Ingress disabled - use separate Ingress resource
    ingress:
      enabled: false

    # Persistence
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 2Gi

    # Priority Class
    priorityClassName: "homelab-infrastructure"

    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Dashboard providers
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /tmp/dashboards

    # Dashboards loaded from grafana.com
    dashboards:
      default:
        # VictoriaMetrics single-node self-monitoring
        victoriametrics-single:
          gnetId: 10229
          revision: 22
          datasource: VictoriaMetrics
        # Node exporter full
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource: VictoriaMetrics
        # Kubernetes cluster overview
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: VictoriaMetrics

    # Sidecar for datasources and dashboards
    sidecar:
      datasources:
        enabled: true
        initDatasources: true
        label: grafana_datasource
        labelValue: "1"
      dashboards:
        enabled: true
        initDashboards: true
        label: grafana_dashboard
        labelValue: "1"
        folder: /tmp/dashboards
        provider:
          name: default
          foldersFromFilesStructure: false

    # Install VictoriaMetrics native datasource plugin
    # Pin to 0.22.0 - latest version (0.23.x) requires Grafana >=11.6.11 which is not yet available
    plugins:
      - victoriametrics-metrics-datasource 0.22.0

    # Backup annotation
    podAnnotations:
      backup.velero.io/backup-volumes: grafana-storage
