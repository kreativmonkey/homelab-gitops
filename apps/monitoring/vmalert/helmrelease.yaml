apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmalert
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/monitoring/victoria-metrics
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-alert
      version: "0.15.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-repo
        namespace: flux-system
  values:
    enabled: true
    replicaCount: 1
    image:
      repository: victoriametrics/vmalert
      tag: v1.138.0
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    server:
      datasource:
        url: "http://victoria-metrics-single:8428"
      remoteWriteURL: "http://victoria-metrics-single:8428/api/v1/write"
      alertmanager:
        url: ""
