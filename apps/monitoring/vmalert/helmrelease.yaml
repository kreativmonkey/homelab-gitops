apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmalert
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/monitoring/victoria-metrics
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-alert
      version: "0.15.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-repo
        namespace: flux-system
  values:
    enabled: true
    replicaCount: 1
    image:
      repository: victoriametrics/vmalert
      tag: v1.138.0
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    datasource:
      url: http://victoria-metrics-single.monitoring.svc:8428
    remoteWrite:
      url: http://victoria-metrics-single.monitoring.svc:8428/api/v1/write
    alertmanager:
      url: ""
      groups:
        - name: kubernetes
          interval: 30s
          rules:
            - alert: KubePodNotReady
              expr: kube_pod_status_phase{phase=~"Pending|Unknown"} > 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Kubernetes Pod not ready"
                description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
            - alert: KubeDeploymentReplicasMismatch
              expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Kubernetes Deployment replicas mismatch"
                description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not matched the expected number of replicas"
            - alert: KubeStatefulSetReplicasMismatch
              expr: kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "StatefulSet replicas mismatch"
                description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected number of replicas"
            - alert: KubeHpaReplicasMismatch
              expr: kube_hpa_status_desired_replicas != kube_hpa_status_current_replicas
              for: 5m
              labels:
                severity: info
              annotations:
                summary: "HPA replicas mismatch"
                description: "HPA {{ $labels.namespace }}/{{ $labels.name }} has not matched the expected number of replicas"
            - alert: CPUThrottlingHigh
              expr: 100 * (sum by(container, pod, namespace) (rate(container_cpu_cfs_throttled_seconds_total[5m])) / sum by(container, pod, namespace) (rate(container_cpu_cfs_seconds_total[5m]))) > 80
              for: 5m
              labels:
                severity: info
              annotations:
                summary: "CPU throttling high"
                description: "CPU throttling is above 80% for {{ $labels.container }} in {{ $labels.pod }} ({{ $labels.namespace }})"
        - name: host
          interval: 30s
          rules:
            - alert: HostHighCpuLoad
              expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High CPU load on host"
                description: "CPU usage is above 80% on {{ $labels.instance }}"
            - alert: HostMemoryUsage
              expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High memory usage on host"
                description: "Memory usage is above 85% on {{ $labels.instance }}"
            - alert: HostDiskUsage
              expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"}) * 100 < 15
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Low disk space on host"
                description: "Disk usage is above 85% on {{ $labels.instance }}"
        - name: victoria-metrics
          interval: 30s
          rules:
            - alert: VMWriteErrors
              expr: increase(vm_write_errors_total[5m]) > 0
              for: 1m
              labels:
                severity: error
              annotations:
                summary: "VictoriaMetrics write errors"
                description: "VictoriaMetrics has write errors: {{ $value }}"
            - alert: VMHighMemoryUsage
              expr: vm_memory_available_bytes / vm_memory_requested_bytes < 1.2
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "VictoriaMetrics high memory usage"
                description: "VictoriaMetrics memory usage is close to requested"
