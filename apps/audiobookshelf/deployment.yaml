apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  labels:
    app: audiobookshelf
spec:
  replicas: 1
  strategy:
    type: Recreate # Verhindert SQLite-Locking bei Pod-Neustarts (Longhorn RWO)
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
      annotations:
        # Velero: Sichert nur SQLite/Cache, NAS sichert sich via ZFS selbst
        backup.velero.io/backup-volumes: config-vol,metadata-vol
    spec:
      securityContext:
        fsGroup: 1000 # Muss zur NFS-Freigabe auf TrueNAS passen
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.19.5 # Version pinnen für GitOps!
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "Europe/Berlin"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config-vol
              mountPath: /config
            - name: metadata-vol
              mountPath: /metadata
            - name: media-vol
              mountPath: /audiobooks
      volumes:
        - name: config-vol
          persistentVolumeClaim:
            claimName: audiobookshelf-config-pvc
        - name: metadata-vol
          persistentVolumeClaim:
            claimName: audiobookshelf-metadata-pvc
        - name: media-vol
          persistentVolumeClaim:
            claimName: audiobookshelf-media-pvc