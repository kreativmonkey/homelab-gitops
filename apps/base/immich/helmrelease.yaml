apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-immich
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  chart:
    spec:
      chart: immich
      version: "0.9.3"
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-immich
      valuesKey: username
      targetPath: env.DB_USERNAME
    - kind: Secret
      name: homelab-postgres-immich
      valuesKey: password
      targetPath: env.DB_PASSWORD
  values:
    global:
      security:
        allowInsecureImages: true
    postgresql:
      enabled: false
    redis:
      enabled: true
      # Bitnami moved their images off Docker Hub in 2025; pin to the legacy
      # mirror to keep `bitnami/redis` references working.
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
      master:
        persistence:
          enabled: false
    env:
      DB_HOSTNAME: homelab-postgres-rw.cnpg-system.svc.cluster.local
      DB_PORT: "5432"
      DB_DATABASE_NAME: immich
    immich:
      persistence:
        library:
          existingClaim: immich-library
    server:
      persistence:
        # subPath = directory under NFS export /mnt/Storagepool/Media (see pv-nfs.yaml)
        library:
          subPath: Bilder
        fotos:
          enabled: true
          mountPath: /fotos
          existingClaim: immich-fotos
          subPath: Fotos
      ingress:
        main:
          enabled: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 4Gi
