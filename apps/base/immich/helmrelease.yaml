apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-immich
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  chart:
    spec:
      chart: immich
      version: "0.9.3"
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-immich
      valuesKey: username
      targetPath: env.DB_USERNAME
    - kind: Secret
      name: homelab-postgres-immich
      valuesKey: password
      targetPath: env.DB_PASSWORD
  values:
    global:
      security:
        allowInsecureImages: true
    postgresql:
      enabled: false
    redis:
      enabled: true
      # Bitnami moved images off docker.io/bitnami; chart default breaks without legacy mirror.
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: 8.2.1-debian-12-r0
      master:
        persistence:
          enabled: false
    env:
      DB_HOSTNAME: immich-postgres-rw.cnpg-system.svc.cluster.local
      DB_PORT: "5432"
      DB_DATABASE_NAME: immich
      # v1.119 supports pgvector or pgvecto.rs only; VectorChord needs Immich v2+.
      DB_VECTOR_EXTENSION: pgvector
    immich:
      persistence:
        library:
          existingClaim: immich-library
    server:
      image:
        tag: v1.119.0
      persistence:
        library:
          subPath: Bilder
        fotos:
          enabled: true
          mountPath: /fotos
          existingClaim: immich-fotos
          subPath: Fotos
      ingress:
        main:
          enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 4Gi
    machine-learning:
      enabled: true
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          memory: 4Gi
