apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-immich
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  chart:
    spec:
      chart: immich
      version: "0.12.0"
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-immich
      valuesKey: username
      targetPath: controllers.main.containers.main.env.DB_USERNAME
    - kind: Secret
      name: homelab-postgres-immich
      valuesKey: password
      targetPath: controllers.main.containers.main.env.DB_PASSWORD
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library
    # Chart 0.12+: bundled postgresql/redis subcharts removed; use valkey + external CNPG.
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          type: emptyDir
          accessMode: ReadWriteOnce
    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME: immich-postgres-rw.cnpg-system.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              # VectorChord on immich-postgres; omit DB_VECTOR_EXTENSION so Immich auto-detects vchord.
            image:
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server versioning=semver
              tag: v2.7.5
    server:
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-server
                # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server versioning=semver
                tag: v2.7.5
      persistence:
        data:
          accessMode: ReadWriteOnce
          subPath: Bilder
        fotos:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-fotos
          accessMode: ReadWriteOnce
          subPath: Fotos
          globalMounts:
            - path: /fotos
      ingress:
        main:
          enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 768Mi
        limits:
          memory: 1Gi
    machine-learning:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                # renovate: datasource=docker depName=ghcr.io/immich-app/immich-machine-learning versioning=semver
                tag: v2.7.5
      persistence:
        cache:
          enabled: true
          type: emptyDir
          accessMode: ReadWriteMany
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi
