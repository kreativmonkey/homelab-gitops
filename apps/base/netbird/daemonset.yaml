apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netbird
  namespace: netbird
spec:
  selector:
    matchLabels:
      app: netbird
  template:
    metadata:
      labels:
        app: netbird
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: homelab-infrastructure
      tolerations:
        - operator: Exists
      containers:
        - name: netbird
          image: netbirdio/netbird:0.71.3
          imagePullPolicy: IfNotPresent
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-setup
                  key: setup-key
            - name: NB_MANAGEMENT_URL
              value: https://netbird.f4mily.net
            - name: NB_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NB_LOG_LEVEL
              value: info
            # Deliver tunnel traffic to host listeners (ingress :80/:443 on same node)
            - name: NB_ENABLE_LOCAL_FORWARDING
              value: "true"
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - SYS_RESOURCE
          livenessProbe:
            exec:
              command: ["netbird", "status", "--check", "live"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["netbird", "status", "--check", "ready"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            exec:
              command: ["netbird", "status", "--check", "startup"]
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
