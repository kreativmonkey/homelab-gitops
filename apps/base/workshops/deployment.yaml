apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshops
  namespace: workshops
  labels:
    app: workshops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshops
  template:
    metadata:
      labels:
        app: workshops
    spec:
      securityContext:
        # git-sync runs as uid/gid 65533; fsGroup makes the shared emptyDir
        # group-writable so it can check out the repo there.
        fsGroup: 65533
      initContainers:
        # One-time clone so nginx has content before it starts serving.
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          args:
            - --repo=https://git.f4mily.net/kreativmonkey/workshops.git
            - --ref=main
            - --root=/git
            - --link=current
            - --depth=1
            - --one-time
          volumeMounts:
            - name: web
              mountPath: /git
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: web
              mountPath: /git
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
        # Sidecar keeps the working copy in sync with the repo (every 60s).
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          args:
            - --repo=https://git.f4mily.net/kreativmonkey/workshops.git
            - --ref=main
            - --root=/git
            - --link=current
            - --depth=1
            - --period=60s
            # Retry forever instead of exiting on transient fetch failures. forgejo shares
            # homelab-postgres, so during an iSCSI/CNPG storage cascade git.f4mily.net briefly
            # 502s; the default --max-failures=0 made this sidecar abort -> pod restart-loop
            # (52 restarts). The initial clone (init container, --one-time) must still succeed.
            - --max-failures=-1
          volumeMounts:
            - name: web
              mountPath: /git
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: web
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: workshops-nginx
