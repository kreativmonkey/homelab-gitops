apiVersion: apps/v1
kind: Deployment
metadata:
  name: truenas-exporter
  namespace: monitoring
  labels:
    app: truenas-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: truenas-exporter
  template:
    metadata:
      labels:
        app: truenas-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: python:3.14-slim
          command: ["python3", "/app/exporter.py"]
          ports:
            - containerPort: 9849
              name: metrics
          env:
            - name: LISTEN_PORT
              value: "9849"
            - name: TRUENAS_TIMEOUT
              # Bound the two sequential API calls so a full scrape (2x) stays
              # well under the probe timeoutSeconds below.
              value: "8"
            - name: TRUENAS_URL
              valueFrom:
                secretKeyRef:
                  name: truenas-exporter-credentials
                  key: TRUENAS_URL
            - name: TRUENAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: truenas-exporter-credentials
                  key: TRUENAS_API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 60
            # The exporter is single-threaded and blocks on synchronous TrueNAS
            # API calls per scrape; timeoutSeconds must exceed a full scrape
            # (2 x TRUENAS_TIMEOUT) or the probe kills a healthy pod.
            timeoutSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: truenas-exporter-script
