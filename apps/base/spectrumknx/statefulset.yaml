apiVersion: v1
kind: Service
metadata:
  name: spectrumknx
  namespace: spectrumknx
spec:
  selector:
    app: spectrumknx
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spectrumknx
  namespace: spectrumknx
spec:
  serviceName: spectrumknx
  replicas: 1
  selector:
    matchLabels:
      app: spectrumknx
  template:
    metadata:
      labels:
        app: spectrumknx
    spec:
      containers:
        - name: spectrumknx
          image: ghcr.io/martinhoefling/spectrumknx:latest
          env:
            - name: POSTGRES_USER
              value: knxuser
            - name: POSTGRES_DB
              value: knx_analyzer
            - name: POSTGRES_HOST
              value: spectrumknx-timescaledb
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spectrumknx-secret
                  key: POSTGRES_PASSWORD
            - name: LOG_LEVEL
              value: INFO
            # KNX_PASSWORD / KNX_PROJECT_PATH intentionally unset: the .knxproj
            # is uploaded via the web UI on first start and persisted to /project.
            # AUTO scans the LAN for a KNXnet/IP gateway. If multicast discovery
            # fails across the Cilium overlay, set an explicit gateway IP here.
            - name: KNX_GATEWAY_IP
              value: AUTO
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: project-data
              mountPath: /project
  volumeClaimTemplates:
    - metadata:
        name: project-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: truenas-iscsi
        resources:
          requests:
            storage: 1Gi
