apiVersion: v1
kind: Service
metadata:
  name: spectrumknx-timescaledb
  namespace: spectrumknx
spec:
  # Headless service — stable DNS for the single StatefulSet replica.
  clusterIP: None
  selector:
    app: spectrumknx-timescaledb
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spectrumknx-timescaledb
  namespace: spectrumknx
spec:
  serviceName: spectrumknx-timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: spectrumknx-timescaledb
  template:
    metadata:
      labels:
        app: spectrumknx-timescaledb
    spec:
      securityContext:
        # postgres user gid in the timescaledb image
        fsGroup: 999
      containers:
        - name: timescaledb
          # TimescaleDB extension required by SpectrumKNX (hypertables); stock
          # CNPG postgres image lacks it, so this app keeps its own DB.
          # Tag pinned by Renovate customManager / manual bump.
          image: timescale/timescaledb:latest-pg16
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: knxuser
            - name: POSTGRES_DB
              value: knx_analyzer
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spectrumknx-secret
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "knxuser", "-d", "knx_analyzer"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: timescale-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: timescale-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: truenas-iscsi
        resources:
          requests:
            storage: 10Gi
