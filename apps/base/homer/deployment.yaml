apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: homer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer
  template:
    metadata:
      labels:
        app: homer
    spec:
      containers:
      - name: homer
        image: b4bz/homer:v25.11.1
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: config
          mountPath: /www/assets
      volumes:
      - name: config
        configMap:
          name: homer-config
