# Internal HTTPS access (cluster wildcard TLS). Alertmanager uses in-cluster URL.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: ai-ops
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: n8n
    gethomepage.dev/description: Workflow automation (AI-Ops)
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: n8n.png
    gethomepage.dev/app: n8n
    # TLS: wildcard-cluster-f4mily-net-tls via reflector (no cluster-issuer).
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    # Webhook POST bodies can be large (full AM payload + LLM context)
    nginx.org/client-max-body-size: "10m"
    # Editor uses WebSocket push (/rest/push) — required for live workflow UI
    nginx.org/websocket-services: "n8n-app"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - n8n.cluster.f4mily.net
      secretName: wildcard-cluster-f4mily-net-tls
  rules:
    - host: n8n.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-app
                port:
                  name: http
