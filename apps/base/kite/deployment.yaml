apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kite-repo
  namespace: flux-system
spec:
  interval: 24h
  url: https://kite-org.github.io/kite/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kite
  namespace: kite
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: cert-manager.io/Certificate/cert-manager/wildcard-f4mily-net
spec:
  interval: 1h
  timeout: 15m
  targetNamespace: kite
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kite
      version: "0.12.2"
      sourceRef:
        kind: HelmRepository
        name: kite-repo
        namespace: flux-system
  values:
    replicaCount: 1
    # Recreate strategy required for RWO volumes
    strategy:
      type: Recreate
    # Image tag defaults to chart appVersion (v0.12.2) — do not override via Renovate helm-values
    service:
      port: 8080
    host: https://kite.cluster.f4mily.net
    
    ingress:
      enabled: true
      className: nginx
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Kite
        gethomepage.dev/description: Kubernetes dashboard
        gethomepage.dev/group: Cluster Management
        gethomepage.dev/icon: kubernetes.png
        gethomepage.dev/app: kite
        nginx.org/ssl-redirect: "false"
        nginx.org/redirect-to-https: "true"
      hosts:
        - host: kite.cluster.f4mily.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: wildcard-cluster-f4mily-net-tls
          hosts:
            - kite.cluster.f4mily.net
    db:
      type: sqlite
      sqlite:
        persistence:
          pvc:
            enabled: true
            # Must match existing PVC storageClassName (immutable after bind). New installs: longhorn-1 is fine.
            storageClass: longhorn
            accessModes:
              - ReadWriteOnce
            size: 1Gi
    # Relaxed probes to prevent premature restarts
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 4
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 512Mi
