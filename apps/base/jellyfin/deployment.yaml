apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/name: jellyfin
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: jellyfin
          image: ghcr.io/jellyfin/jellyfin:2026030905
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8096
              name: http
              protocol: TCP
            - containerPort: 7359
              name: discovery
              protocol: UDP
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: "https://jellyfin.f4mily.net"
            - name: TZ
              value: "Europe/Berlin"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1536Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            # PV mounts export root /mnt/Storagepool/Media — subPath = path under /mnt/truenas/Media
            - name: config
              mountPath: /config
              subPath: jellyfin/config
            - name: cache
              mountPath: /cache
              subPath: jellyfin/cache
            - name: media
              mountPath: /media
              subPath: MediaStack/media
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  type: ClusterIP
  ports:
    - port: 8096
      targetPort: http
      name: http
      protocol: TCP
    - port: 7359
      targetPort: discovery
      name: discovery
      protocol: UDP
  selector:
    app: jellyfin
