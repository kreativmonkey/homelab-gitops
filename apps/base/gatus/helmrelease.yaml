apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: gatus
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: twin-repo
        namespace: flux-system
  values:
    priorityClassName: homelab-infrastructure

    # Eigenes Ingress (siehe ingress.yaml)
    ingress:
      enabled: false

    # Minimalressourcen – Gatus ist extrem leichtgewichtig
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

    # RollingUpdate (default) – Recreate blockiert, weil Chart immer rollingUpdate: {}
    # rendert, was Kubernetes bei type=Recreate verbietet.
    # Bei RWO-PVC-Upgrade kurzzeitig Multi-Attach-Error, Recovery funktioniert aber.
    # deployment:
    #   strategy: Recreate

    # Persistenz für SQLite-Datenbank (Uptime-Verlauf)
    persistence:
      enabled: true
      size: 200Mi
      storageClass: truenas-iscsi
      accessModes:
        - ReadWriteOnce

    # Gatus-Konfiguration mit allen Ingress-Endpunkten
    config:
      # Metriken für VictoriaMetrics-Scraping aktivieren
      metrics: true

      # UI
      ui:
        title: Cluster Status
        default-sort-by: group

      endpoints:
        # ──────────────────────────────────────────────
        #  YAML-Anchor: Split-Horizon DNS via internen Resolver
        # ──────────────────────────────────────────────
        # Erzwingt Auflösung von f4mily.net/cluster.f4mily.net
        # über den internen DNS (192.168.10.1) statt CoreDNS.
        # ──────────────────────────────────────────────

        # ──────────────────────────────────────────────
        # Public (f4mily.net)
        # ──────────────────────────────────────────────
        - name: audiobookshelf
          group: media
          url: https://audible.f4mily.net/healthcheck
          interval: 60s
          client: &default-dns
            dns-resolver: tcp://192.168.10.1:53
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == "OK"'

        - name: immich
          group: media
          url: https://immich.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: jellyfin
          group: media
          url: https://jellyfin.f4mily.net/health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == "Healthy"'

        - name: kavita
          group: media
          url: https://books.f4mily.net/api/health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == "Ok"'

        - name: paperless
          group: documents
          url: https://paperless.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: readeck
          group: documents
          url: https://readeck.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: sterling-pdf
          group: documents
          url: https://pdf.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://192.168.10.1:53
            timeout: 180s
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: linkding
          group: bookmarks
          url: https://bookmarks.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        # linkwarden deaktiviert (aus Overlay-Katalog entfernt, s. kustomization.yaml)

        - name: homepage
          group: tools
          url: https://home.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: fitness
          group: tools
          url: https://fitness.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: searxng
          group: tools
          url: https://search.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://192.168.10.1:53
            timeout: 120s
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: tandoor
          group: tools
          url: https://rezepte.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://192.168.10.1:53
            timeout: 180s
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: teslamate
          group: monitoring
          url: https://teslamate.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: teslamate-ws
          group: monitoring
          url: wss://teslamate.f4mily.net/live/websocket
          interval: 60s
          client: *default-dns
          conditions:
             - "[CONNECTED] == true"

        - name: teslamate-grafana
          group: monitoring
          url: https://teslamate.f4mily.net/grafana/
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: git
          group: core
          url: https://git.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: authentik
          group: core
          url: https://login.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: nextcloud
          group: core
          url: https://nc.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        # ──────────────────────────────────────────────
        # Cluster-internal (cluster.f4mily.net)
        # ──────────────────────────────────────────────
        - name: grafana
          group: observability
          url: https://grafana.cluster.f4mily.net/api/health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: victoria-metrics
          group: observability
          url: https://metrics.cluster.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: homer
          group: observability
          url: https://homer.cluster.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: goloom
          group: automation
          url: https://goloom.cluster.f4mily.net/healthz
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: n8n
          group: automation
          url: https://n8n.cluster.f4mily.net/healthz
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == "{"status":"ok"}"'

        - name: n8n-ws
          group: automation
          url: wss://n8n.cluster.f4mily.net/rest/push
          interval: 60s
          client: *default-dns
          conditions:
             - "[CONNECTED] == true"

        - name: watchyourlan
          group: network
          url: https://watchyourlan.cluster.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"
