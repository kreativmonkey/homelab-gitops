apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: gatus
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: twin-repo
        namespace: flux-system
  values:
    priorityClassName: homelab-infrastructure

    # Eigenes Ingress (siehe ingress.yaml)
    ingress:
      enabled: false

    # Minimalressourcen – Gatus ist extrem leichtgewichtig
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

    # Persistenz für SQLite-Datenbank (Uptime-Verlauf)
    persistence:
      enabled: true
      size: 200Mi
      storageClass: truenas-iscsi
      accessModes:
        - ReadWriteOnce

    # Gatus-Konfiguration mit allen Ingress-Endpunkten
    config:
      # Metriken für VictoriaMetrics-Scraping aktivieren
      metrics: true

      # UI-Titel
      ui:
        title: Cluster Status

      endpoints:
        # ──────────────────────────────────────────────
        # Public (f4mily.net)
        # ──────────────────────────────────────────────
        - name: audible
          url: https://audible.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: git
          url: https://git.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: authentik
          url: https://login.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: homepage
          url: https://home.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: immich
          url: https://immich.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"

        - name: jellyfin
          url: https://jellyfin.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"

        - name: kavita
          url: https://books.f4mily.net/api/health
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: paperless
          url: https://paperless.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: sterling-pdf
          url: https://pdf.f4mily.net
          interval: 60s
          client:
            timeout: 180s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: searxng
          url: https://search.f4mily.net
          interval: 60s
          client:
            timeout: 120s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: teslamate
          url: https://teslamate.f4mily.net
          interval: 60s
          client:
            headers:
              Host: teslamate.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: tandoor
          url: https://rezepte.f4mily.net
          interval: 60s
          client:
            timeout: 180s
            headers:
              Host: rezepte.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: linkding
          url: https://bookmarks.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: linkwarden
          url: https://linkwarden.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: readeck
          url: https://readeck.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: fitness
          url: https://fitness.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: nextcloud
          url: https://nc.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"

        # ──────────────────────────────────────────────
        # Cluster-internal (cluster.f4mily.net)
        # ──────────────────────────────────────────────
        - name: goloom
          url: https://goloom.cluster.f4mily.net/healthz
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: grafana
          url: https://grafana.cluster.f4mily.net/api/health
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: victoria-metrics
          url: https://metrics.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: n8n
          url: https://n8n.cluster.f4mily.net/healthz
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: homer
          url: https://homer.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: uptime-kuma
          url: https://uptime-kuma.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: unifi-controller
          url: https://unifi-controller.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: watchyourlan
          url: https://watchyourlan.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"
