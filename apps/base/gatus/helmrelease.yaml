apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: gatus
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: twin-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: gatus-authentik-oauth
      valuesKey: client-id
      targetPath: env.OIDC_CLIENT_ID
    - kind: Secret
      name: gatus-authentik-oauth
      valuesKey: client-secret
      targetPath: env.OIDC_CLIENT_SECRET
  values:
    priorityClassName: homelab-infrastructure

    # Eigenes Ingress (siehe ingress.yaml)
    ingress:
      enabled: false

    # Minimalressourcen – Gatus ist extrem leichtgewichtig
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

    # Recreate vermeidet RWO-Multi-Attach-Deadlock bei RollingUpdate.
    deployment:
      strategy: Recreate

    # Persistenz für SQLite-Datenbank (Uptime-Verlauf)
    persistence:
      enabled: true
      size: 200Mi
      storageClass: truenas-iscsi
      accessModes:
        - ReadWriteOnce

    # Gatus-Konfiguration mit allen Ingress-Endpunkten
    config:
      # Metriken für VictoriaMetrics-Scraping aktivieren
      metrics: true

      # PVC mountPath ist /data — ohne storage bleibt Default "memory" (History weg nach Restart)
      storage:
        type: sqlite
        path: /data/data.db
        caching: true

      # UI
      ui:
        title: Cluster Status
        default-sort-by: group

      # Authentik OIDC — credentials via ${OIDC_*} from gatus-authentik-oauth secret (just gatus-authentik-oauth)
      security:
        oidc:
          issuer-url: https://login.f4mily.net/application/o/gatus/
          redirect-url: https://status.cluster.f4mily.net/authorization-code/callback
          client-id: ${OIDC_CLIENT_ID}
          client-secret: ${OIDC_CLIENT_SECRET}
          scopes:
            - openid
            - profile
            - email

      endpoints:
        # ──────────────────────────────────────────────
        #  YAML-Anchor: Split-Horizon DNS via internen Resolver
        # ──────────────────────────────────────────────
        # Erzwingt Auflösung von f4mily.net/cluster.f4mily.net
        # über den internen DNS (192.168.10.1) statt CoreDNS.
        # ──────────────────────────────────────────────

        # ──────────────────────────────────────────────
        # Public (f4mily.net)
        # ──────────────────────────────────────────────
        - name: audiobookshelf
          group: media
          url: https://audible.f4mily.net/healthcheck
          interval: 60s
          client: &default-dns
            dns-resolver: tcp://192.168.10.1:53
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == OK'

        - name: immich
          group: media
          url: https://immich.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: jellyfin
          group: media
          url: https://jellyfin.f4mily.net/health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == Healthy'

        - name: kavita
          group: media
          url: https://books.f4mily.net/api/health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == Ok'

        - name: paperless
          group: documents
          url: https://paperless.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: readeck
          group: documents
          url: https://readeck.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: sterling-pdf
          group: documents
          url: https://pdf.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://192.168.10.1:53
            timeout: 180s
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: outline
          group: application
          url: https://outline.f4mily.net/_health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: linkding
          group: application
          url: https://bookmarks.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        # linkwarden deaktiviert (aus Overlay-Katalog entfernt, s. kustomization.yaml)

        - name: homepage
          group: core
          url: https://home.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: fitness
          group: application
          url: https://fitness.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: searxng
          group: core
          url: https://search.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://192.168.10.1:53
            timeout: 120s
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: tandoor
          group: application
          url: https://rezepte.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://192.168.10.1:53
            timeout: 180s
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: teslamate
          group: observability
          url: https://teslamate.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == pat(*TeslaMate*)'

        - name: teslamate-grafana
          group: observability
          url: https://teslamate.f4mily.net/grafana/
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: git
          group: core
          url: https://git.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: authentik
          group: core
          url: https://login.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: nextcloud
          group: core
          url: https://nc.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        # ──────────────────────────────────────────────
        # Cluster-internal (cluster.f4mily.net)
        # ──────────────────────────────────────────────
        - name: grafana
          group: observability
          url: https://grafana.cluster.f4mily.net/api/health
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: victoria-metrics
          group: observability
          url: https://metrics.cluster.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: homer
          group: observability
          url: https://homer.cluster.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: goloom
          group: automation
          url: https://goloom.cluster.f4mily.net/healthz
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: n8n
          group: automation
          url: https://n8n.cluster.f4mily.net/healthz
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY].status == ok'

        - name: n8n-main
          group: automation
          url: https://n8n.cluster.f4mily.net/
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == pat(*n8n*)'

        - name: watchyourlan
          group: observability
          url: https://watchyourlan.cluster.f4mily.net
          interval: 60s
          client: *default-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        # ──────────────────────────────────────────────
        #  External: gleiche Endpoints, aber von extern getriggert
        # ──────────────────────────────────────────────
        # Erzwingt öffentliche DNS-Auflösung (Cloudflare 1.1.1.1)
        # statt Split-Horizon, um die externe Erreichbarkeit über
        # den öffentlichen Reverse-Proxy/Ingress zu verifizieren.
        # Interne Trigger oben bleiben unangetastet.
        # ──────────────────────────────────────────────
        - name: audiobookshelf
          group: external
          url: https://audible.f4mily.net/healthcheck
          interval: 60s
          client: &external-dns
            dns-resolver: tcp://1.1.1.1:53
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == OK'

        - name: kavita
          group: external
          url: https://books.f4mily.net/api/health
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == Ok'

        - name: fitness
          group: external
          url: https://fitness.f4mily.net
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: git
          group: external
          url: https://git.f4mily.net
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: goloom
          group: external
          url: https://goloom.f4mily.net/healthz
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: immich
          group: external
          url: https://immich.f4mily.net
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: jellyfin
          group: external
          url: https://jellyfin.f4mily.net/health
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"
             - '[BODY] == Healthy'

        - name: nextcloud
          group: external
          url: https://nc.f4mily.net
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: outline
          group: external
          url: https://outline.f4mily.net/_health
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] == 200"
             - "[RESPONSE_TIME] < 5000"

        - name: readeck
          group: external
          url: https://readeck.f4mily.net
          interval: 60s
          client: *external-dns
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        - name: tandoor
          group: external
          url: https://rezepte.f4mily.net
          interval: 60s
          client:
            dns-resolver: tcp://1.1.1.1:53
            timeout: 180s
          conditions:
             - "[STATUS] < 400"
             - "[RESPONSE_TIME] < 5000"

        # ──────────────────────────────────────────────
        # Externe Services
        # ──────────────────────────────────────────────

        - name: Blog
          group: Binaergewitter
          url: https://blog.binaergewitter.de
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
              - '[BODY] == pat(*Binärgewitter*)'
        
        - name: Feed
          group: Binaergewitter
          url: https://feed.binaergewitter.de
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
        
        - name: Download Server 1
          group: Binaergewitter
          url: https://download.binaergewitter.de/
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
              - "len([BODY]) > 5"

        - name: Download Server 2
          group: Binaergewitter
          url: https://dl2.binaergewitter.de/
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
              - "len([BODY]) > 5"

        - name: Etherpad
          group: Binaergewitter
          url: https://etherpad.binaergewitter.de/stats
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"

        - name: Planer
          group: Binaergewitter
          url: https://plan.binaergewitter.de/
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"

        - name: Jit.social
          group: Keller.io
          url: https://jit.social/health
          interval: 60s
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
              - "[BODY] == OK"

        - name: Keycloak
          group: Keller.io
          # Enable Health endpoints for Keycloak
          # KC_HEALTH_ENABLED=true
          # use url: https://auth.savar.de/health
          url: https://auth.savar.de
          interval: 60s
          conditions:
              - "[STATUS] < 400"
              - "[RESPONSE_TIME] < 5000"
              - "[BODY] == pat(*Console*)"

        - name: Gitlab
          group: Keller.io
          url: https://gitlab.jit-creatives.de/users/sign_in
          interval: 60s
          conditions:
              - "[STATUS] < 400"
              - "[RESPONSE_TIME] < 5000"
              - "[BODY] == pat(*GitLab*)"

        - name: Nextcloud 
          group: Keller.io 
          url: https://cloud.savar.de/status.php
          conditions:
              - "[STATUS] == 200"
              - "[RESPONSE_TIME] < 5000"
              - "[BODY] == pat(*Nextcloud*)"
