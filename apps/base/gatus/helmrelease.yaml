apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: gatus
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: twin-repo
        namespace: flux-system
  values:
    priorityClassName: homelab-infrastructure

    # Recreate-Strategie wegen RWO PVC (truenas-iscsi) – RollingUpdate blockiert sonst
    deployment:
      strategy: Recreate

    # Eigenes Ingress (siehe ingress.yaml)
    ingress:
      enabled: false

    # Minimalressourcen – Gatus ist extrem leichtgewichtig
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

    # Persistenz für SQLite-Datenbank (Uptime-Verlauf)
    persistence:
      enabled: true
      size: 200Mi
      storageClass: truenas-iscsi
      accessModes:
        - ReadWriteOnce

    # Gatus-Konfiguration mit allen Ingress-Endpunkten
    config:
      # Metriken für VictoriaMetrics-Scraping aktivieren
      metrics: true

      # UI-Titel
      ui:
        title: Cluster Status

      endpoints:
        # ──────────────────────────────────────────────
        # Public (f4mily.net)
        # ──────────────────────────────────────────────
        - name: audible
          group: media
          url: https://audible.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: immich
          group: media
          url: https://immich.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"

        - name: jellyfin
          group: media
          url: https://jellyfin.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"

        - name: kavita
          group: media
          url: https://books.f4mily.net/api/health
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: paperless
          group: documents
          url: https://paperless.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: readeck
          group: documents
          url: https://readeck.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: sterling-pdf
          group: documents
          url: https://pdf.f4mily.net
          interval: 60s
          client:
            timeout: 180s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: linkding
          group: bookmarks
          url: https://bookmarks.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 5000"

        - name: linkwarden
          group: bookmarks
          url: https://linkwarden.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: homepage
          group: tools
          url: https://home.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: fitness
          group: tools
          url: https://fitness.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: searxng
          group: tools
          url: https://search.f4mily.net
          interval: 60s
          client:
            timeout: 120s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: tandoor
          group: tools
          url: https://rezepte.f4mily.net
          interval: 60s
          client:
            timeout: 180s
          headers:
            Host: rezepte.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: teslamate
          group: monitoring
          url: https://teslamate.f4mily.net
          interval: 60s
          headers:
            Host: teslamate.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: git
          group: core
          url: https://git.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: authentik
          group: core
          url: https://login.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: nextcloud
          group: core
          url: https://nc.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"

        # ──────────────────────────────────────────────
        # Cluster-internal (cluster.f4mily.net)
        # ──────────────────────────────────────────────
        - name: grafana
          group: observability
          url: https://grafana.cluster.f4mily.net/api/health
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: victoria-metrics
          group: observability
          url: https://metrics.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: homer
          group: observability
          url: https://homer.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"

        - name: uptime-kuma
          group: observability
          url: https://uptime-kuma.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: goloom
          group: automation
          url: https://goloom.cluster.f4mily.net/healthz
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: n8n
          group: automation
          url: https://n8n.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 5000"

        - name: unifi-controller
          group: network
          url: https://unifi-controller.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"

        - name: watchyourlan
          group: network
          url: https://watchyourlan.cluster.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 500"
            - "[RESPONSE_TIME] < 3000"
