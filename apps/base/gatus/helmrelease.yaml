apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: gatus
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: twin-repo
        namespace: flux-system
  values:
    priorityClassName: homelab-infrastructure

    # Eigenes Ingress (siehe ingress.yaml)
    ingress:
      enabled: false

    # Minimalressourcen – Gatus ist extrem leichtgewichtig
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

    # Recreate erforderlich für RWO PVC (truenas-iscsi), sonst Deadlock bei Upgrade
    deployment:
      strategy: Recreate

    # Persistenz für SQLite-Datenbank (Uptime-Verlauf)
    persistence:
      enabled: true
      size: 200Mi
      storageClass: truenas-iscsi
      accessModes:
        - ReadWriteOnce

    # Gatus-Konfiguration mit allen Ingress-Endpunkten
    config:
      # Metriken für VictoriaMetrics-Scraping aktivieren
      metrics: true

      # UI
      ui:
        title: Cluster Status
        default-sort-by: group

      # Interne URLs: Gatus routet über nginx ClusterIP mit Host-Header.
      # http:// + Host-Header umgeht Hairpin NAT / TLS-Zertifikatsprobleme.

      endpoints:
        # ──────────────────────────────────────────────
        # Public (f4mily.net)
        # ──────────────────────────────────────────────
        - name: audible
          group: media
          url: https://audible.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: immich
          group: media
          url: https://immich.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: jellyfin
          group: media
          url: https://jellyfin.f4mily.net/health
          interval: 60s
          conditions:
            - "[STATUS] < 400"
            - "[BODY].status == Healthy"
            - "[RESPONSE_TIME] < 5000"

        - name: kavita
          group: media
          url: https://books.f4mily.net/api/health
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: paperless
          group: documents
          url: https://paperless.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: readeck
          group: documents
          url: https://readdeck.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: sterling-pdf
          group: documents
          url: https://pdf.f4mily.net
          interval: 60s
          client:
            timeout: 180s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: linkding
          group: bookmarks
          url: https://bookmarks.f4mily.net
          interval: 60s
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        # linkwarden deaktiviert (aus Overlay-Katalog entfernt, s. kustomization.yaml)

        - name: homepage
          group: tools
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: home.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: fitness
          group: tools
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: fitness.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: searxng
          group: tools
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          client:
            timeout: 120s
          headers:
            Host: search.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: tandoor
          group: tools
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          client:
            timeout: 180s
          headers:
            Host: rezepte.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: teslamate
          group: monitoring
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: teslamate.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: teslamate-grafana
          group: monitoring
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx/grafana/
          interval: 60s
          headers:
            Host: teslamate.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: git
          group: core
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: git.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: authentik
          group: core
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: login.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: nextcloud
          group: core
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: nc.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        # ──────────────────────────────────────────────
        # Cluster-internal (cluster.f4mily.net)
        # ──────────────────────────────────────────────
        - name: grafana
          group: observability
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx/api/health
          interval: 60s
          headers:
            Host: grafana.cluster.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: victoria-metrics
          group: observability
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: metrics.cluster.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: homer
          group: observability
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: homer.cluster.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: goloom
          group: automation
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx/healthz
          interval: 60s
          headers:
            Host: goloom.cluster.f4mily.net
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 5000"

        - name: n8n
          group: automation
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: n8n.cluster.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"

        - name: watchyourlan
          group: network
          url: http://ingress-nginx-nginx-ingress-controller.ingress-nginx
          interval: 60s
          headers:
            Host: watchyourlan.cluster.f4mily.net
          conditions:
            - "[STATUS] < 400"
            - "[RESPONSE_TIME] < 5000"
