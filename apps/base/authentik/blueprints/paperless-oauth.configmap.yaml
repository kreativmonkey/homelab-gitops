apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-paperless-blueprint
  namespace: authentik
  labels:
    app.kubernetes.io/part-of: authentik
data:
  paperless.yaml: |
    version: 1
    metadata:
      name: Homelab Paperless OIDC
      labels:
        blueprints.goauthentik.io/description: OAuth2 provider and application for Paperless-ngx
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: paperless-provider
        identifiers:
          name: Provider for Paperless
        attrs:
          name: Provider for Paperless
          client_type: confidential
          client_id: qKeg0wbITh8B8r3OUdlLCzATt6nODf8UeUnC9grv
          # Must match apps/overlays/main/paperless-ngx-integrations.secret.yaml (Authentik OIDC secret).
          client_secret: paperless-authentik-sync-from-integrations-secret
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://paperless.f4mily.net/accounts/oidc/authentik/login/callback/
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      - model: authentik_core.application
        identifiers:
          slug: paperless
        attrs:
          name: Paperless
          slug: paperless
          provider: !KeyOf paperless-provider
          launch_url: https://paperless.f4mily.net
          meta_launch_url: https://paperless.f4mily.net
