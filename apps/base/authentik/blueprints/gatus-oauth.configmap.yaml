apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-gatus-blueprint
  namespace: authentik
  labels:
    app.kubernetes.io/part-of: authentik
data:
  gatus.yaml: |
    version: 1
    metadata:
      name: Homelab Gatus OIDC
      labels:
        blueprints.goauthentik.io/description: OAuth2 provider and application for Gatus status page
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: gatus-provider
        identifiers:
          client_id: homelab-gatus
        attrs:
          name: Provider for Gatus
          client_type: confidential
          client_id: homelab-gatus
          # Must match apps/base/gatus/gatus-authentik-oauth.secret.yaml (client-secret).
          client_secret: homelab-gatus-change-me
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          encryption_key: null
          redirect_uris:
            - matching_mode: strict
              url: https://status.cluster.f4mily.net/authorization-code/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      - model: authentik_core.application
        identifiers:
          slug: gatus
        attrs:
          name: Gatus
          slug: gatus
          provider: !KeyOf gatus-provider
          launch_url: https://status.cluster.f4mily.net
          meta_launch_url: https://status.cluster.f4mily.net
