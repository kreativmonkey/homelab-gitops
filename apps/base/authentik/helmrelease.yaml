apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/authentik/homelab-postgres-authentik
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: authentik
      version: "2024.10.4"
      sourceRef:
        kind: HelmRepository
        name: authentik-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-authentik
      valuesKey: password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret-key
      valuesKey: secret-key
      targetPath: authentik.secret_key
  values:
    postgresql:
      enabled: false
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
    authentik:
      postgresql:
        host: homelab-postgres-rw.cnpg-system.svc.cluster.local
        port: 5432
        name: authentik
        user: authentik
    server:
      ingress:
        enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
