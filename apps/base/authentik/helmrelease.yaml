apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-authentik
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: authentik
      # Upgrade path: 2026.2.3 → 2026.5.x (see docs/migrations/authentik-upgrade-2026.md)
      version: "2026.5.4"
      sourceRef:
        kind: HelmRepository
        name: authentik-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-authentik
      valuesKey: password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret-key
      valuesKey: secret-key
      targetPath: authentik.secret_key
  values:
    global:
      security:
        allowInsecureImages: true
    postgresql:
      enabled: false
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: 8.2.1-debian-12-r0
      master:
        persistence:
          enabled: false
    authentik:
      postgresql:
        host: homelab-postgres-rw.cnpg-system.svc.cluster.local
        port: 5432
        name: authentik
        user: authentik
      email:
        host: mail.f4mily.net
        port: 465
        username: authentik@f4mily.net
        use_ssl: true
        from: authentik@f4mily.net
        timeout: 10
      error_reporting:
        enabled: true
    # Production DB is authoritative for migrated apps; add new providers here only.
    blueprints:
      configMaps:
        - authentik-paperless-blueprint
        - authentik-gatus-blueprint
        - authentik-linkding-blueprint
        - authentik-dawarich-blueprint
    server:
      ingress:
        enabled: false
      deploymentStrategy:
        type: Recreate
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: media-init
          image: docker.io/library/busybox:1.38
          command:
            - sh
            - -c
            - mkdir -p /data/media/public/application-icons && chown -R 1000:1000 /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
      resources:
        requests:
          cpu: 25m
          memory: 768Mi
        limits:
          memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: data
          mountPath: /data
    worker:
      # 2026-06-09: limit raised 2Gi→4Gi (OOMKilled, exit 137)
      #   Previous pod ran 3.5d then OOM. DockerException spam
      #   (outpost_service_connection_monitor → Docker) on Talos
      #   is harmless but adds CPU/memory pressure.
      resources:
        requests:
          cpu: 50m
          memory: 1Gi
        limits:
          memory: 4Gi
