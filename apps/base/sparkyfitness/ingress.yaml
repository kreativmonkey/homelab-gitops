# /api and /uploads → server; / → frontend (chart service names).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sparkyfitness
  namespace: sparkyfitness
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: SparkyFitness
    gethomepage.dev/description: Fitness Tracking
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: sparkyfitness.png
    gethomepage.dev/pod-selector: app.kubernetes.io/component=frontend,app.kubernetes.io/instance=sparkyfitness
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/client-max-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fitness.f4mily.net
      secretName: wildcard-f4mily-net-tls
  rules:
    - host: fitness.f4mily.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sparkyfitness-server
                port:
                  number: 3010
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: sparkyfitness-server
                port:
                  number: 3010
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sparkyfitness-frontend
                port:
                  number: 8080
