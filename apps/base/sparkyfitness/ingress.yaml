apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sparkyfitness
  namespace: sparkyfitness
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: SparkyFitness
    gethomepage.dev/description: Fitness Tracking
    gethomepage.dev/group: Health
    gethomepage.dev/icon: mdi-dumbbell
    gethomepage.dev/pod-selector: app=sparkyfitness-frontend
    nginx.org/client-max-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fitness.f4mily.net
      secretName: wildcard-f4mily-net-tls
  rules:
    - host: fitness.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sparkyfitness
                port:
                  number: 80
