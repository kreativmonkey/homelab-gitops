apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
  namespace: sparkyfitness
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-sparkyfitness
spec:
  interval: 1h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: helm/chart
      sourceRef:
        kind: GitRepository
        name: sparkyfitness-chart
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: sparkyfitness-app-values
      valuesKey: SPARKY_FITNESS_API_ENCRYPTION_KEY
      targetPath: server.secrets.apiEncryptionKey
    - kind: Secret
      name: sparkyfitness-app-values
      valuesKey: BETTER_AUTH_SECRET
      targetPath: server.secrets.betterAuthSecret
    - kind: Secret
      name: sparkyfitness-app-values
      valuesKey: SPARKY_FITNESS_OIDC_CLIENT_ID
      targetPath: config.oidc.secrets.clientId
    - kind: Secret
      name: sparkyfitness-app-values
      valuesKey: SPARKY_FITNESS_OIDC_CLIENT_SECRET
      targetPath: config.oidc.secrets.clientSecret
  values:
    # Public GHCR app images require auth; Docker Hub mirrors match upstream split server/frontend.
    global:
      imageRegistry: docker.io
    postgresql:
      enabled: false
    externalDatabase:
      host: homelab-postgres-rw.cnpg-system.svc.cluster.local
      port: 5432
      database: sparkyfitness
      auth:
        existingSecret: homelab-postgres-sparkyfitness
    server:
      replicas: 1
      image:
        # renovate: datasource=docker depName=codewithcj/sparkyfitness_server versioning=semver
        repository: codewithcj/sparkyfitness_server
        tag: v0.16.6.3
      secrets:
        generate: false
      appDatabase:
        existingSecret: homelab-postgres-sparkyfitness-app
      persistence:
        uploads:
          storageClass: truenas-iscsi
          size: 10Gi
        backup:
          storageClass: truenas-iscsi
          size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
    frontend:
      image:
        # renovate: datasource=docker depName=codewithcj/sparkyfitness versioning=semver
        repository: codewithcj/sparkyfitness
        tag: v0.16.6.3
      # Docker Hub `codewithcj/sparkyfitness` listens on 8080 (not chart default :80 / ghcr frontend image).
      port: 8080
      service:
        port: 8080
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi
    config:
      # Chart ingress is disabled; without this Better Auth defaults to localhost:3004 → Invalid origin.
      frontendUrl: https://fitness.f4mily.net
      # Better Auth SSO: OIDC discovery host must be a trusted origin (discovery_untrusted_origin).
      extraTrustedOrigins: https://login.f4mily.net
      timezone: Europe/Berlin
      # Chart default forceEmailLogin=true keeps email login even when OIDC is on — disable for SSO-only.
      forceEmailLogin: false
      disableEmailLogin: true
      oidc:
        enabled: true
        providerSlug: authentik
        providerName: Authentik
        # Authentik application slug must match path segment (discovery: …/application/o/sparkyfitness/).
        issuerUrl: https://login.f4mily.net/application/o/sparkyfitness/
        # https://codewithcj.github.io/SparkyFitness/administration/oauth-authentication
        scope: openid profile email
        logoUrl: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/authentik.svg
        autoRegister: true
        autoRedirect: true
        # Better Auth SSO callback (register in Authentik redirect URIs):
        # https://fitness.f4mily.net/api/auth/sso/callback/authentik
    ingress:
      enabled: false
    databaseBackup:
      enabled: false
