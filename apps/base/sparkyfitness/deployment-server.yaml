apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparkyfitness-server
  namespace: sparkyfitness
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-sparkyfitness
spec:
  replicas: 1
  strategy:
    $patch: replace
    type: Recreate
  selector:
    matchLabels:
      app: sparkyfitness-server
  template:
    metadata:
      labels:
        app: sparkyfitness-server
        app.kubernetes.io/name: sparkyfitness
        app.kubernetes.io/component: server
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          # renovate: datasource=docker depName=codewithcj/sparkyfitness_server versioning=semver
          image: docker.io/codewithcj/sparkyfitness_server:v0.16.6.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3010
              name: http
          env:
            - name: TZ
              value: Europe/Berlin
            - name: NODE_ENV
              value: production
            - name: SPARKY_FITNESS_SERVER_PORT
              value: "3010"
            - name: SPARKY_FITNESS_FRONTEND_URL
              value: https://fitness.f4mily.net
            - name: BETTER_AUTH_URL
              value: https://fitness.f4mily.net
            - name: SPARKY_FITNESS_DB_HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: SPARKY_FITNESS_DB_PORT
              value: "5432"
            - name: SPARKY_FITNESS_DB_NAME
              value: sparkyfitness
            - name: SPARKY_FITNESS_DB_USER
              value: sparkyfitness
            - name: SPARKY_FITNESS_APP_DB_USER
              value: sparkyfitness_app
            - name: SPARKY_FITNESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-db-credentials
                  key: password
            - name: SPARKY_FITNESS_APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sparkyfitness-app-db-credentials
                  key: password
            - name: SERVER_UPLOADS_PATH
              value: /app/data/uploads
            - name: SERVER_BACKUP_PATH
              value: /app/data/backups
            - name: SPARKY_FITNESS_OIDC_AUTH_ENABLED
              value: "true"
            - name: SPARKY_FITNESS_OIDC_ISSUER_URL
              value: https://login.f4mily.net/application/o/sparkyfitness/
            - name: SPARKY_FITNESS_OIDC_PROVIDER_SLUG
              value: authentik
            - name: SPARKY_FITNESS_OIDC_AUTO_REGISTER
              value: "true"
          envFrom:
            - secretRef:
                name: sparkyfitness-app
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sparkyfitness-data
