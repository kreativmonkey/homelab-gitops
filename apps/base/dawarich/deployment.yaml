# Single pod with two containers (web app + Sidekiq worker), mirroring the
# upstream k8s guide. Both share the RWO PVCs, so they MUST co-locate in one
# pod. strategy: Recreate avoids two pods racing for the same iSCSI volumes
# during rollouts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich
  namespace: dawarich
  labels:
    app: dawarich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dawarich
  template:
    metadata:
      labels:
        app: dawarich
      annotations:
        # Bump when dawarich-env ConfigMap changes — the app reads env via
        # configMapRef at startup, so a pod-template change is needed to roll
        # new env (no Reloader in-cluster). Increment on each config edit.
        config.dawarich/env-revision: "2"
    spec:
      containers:
        # ---------------------------------------------------------------- web
        - name: dawarich-app
          # renovate: datasource=docker depName=freikin/dawarich versioning=semver
          image: freikin/dawarich:1.8.1
          imagePullPolicy: IfNotPresent
          command: ["web-entrypoint.sh"]
          args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
          envFrom:
            - configMapRef:
                name: dawarich-env
          env:
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-dawarich
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-dawarich
                  key: password
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: dawarich-app
                  key: SECRET_KEY_BASE
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dawarich-authentik-oauth
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dawarich-authentik-oauth
                  key: client-secret
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: public
              mountPath: /var/app/public
            - name: watched
              mountPath: /var/app/tmp/imports/watched
            - name: storage
              mountPath: /var/app/storage
          # APPLICATION_PROTOCOL=https sets Rails config.force_ssl, which 301-redirects
          # plain HTTP to https:// — the kubelet then does a TLS handshake against the
          # plain-HTTP Puma ("SSL connection to non-SSL Puma") and the probe fails. The
          # X-Forwarded-Proto header makes Rails treat the probe as already-secure → 200.
          # startupProbe gates liveness during the (slow) first-boot DB migration.
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
              httpHeaders:
                - name: X-Forwarded-Proto
                  value: https
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 3Gi
        # ------------------------------------------------------------ sidekiq
        - name: dawarich-sidekiq
          # renovate: datasource=docker depName=freikin/dawarich versioning=semver
          image: freikin/dawarich:1.8.1
          imagePullPolicy: IfNotPresent
          command: ["sidekiq-entrypoint.sh"]
          args: ["bundle", "exec", "sidekiq"]
          envFrom:
            - configMapRef:
                name: dawarich-env
          env:
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-dawarich
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-dawarich
                  key: password
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: dawarich-app
                  key: SECRET_KEY_BASE
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dawarich-authentik-oauth
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dawarich-authentik-oauth
                  key: client-secret
            - name: BACKGROUND_PROCESSING_CONCURRENCY
              value: "10"
          volumeMounts:
            - name: public
              mountPath: /var/app/public
            - name: watched
              mountPath: /var/app/tmp/imports/watched
            - name: storage
              mountPath: /var/app/storage
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f sidekiq"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 3Gi
      volumes:
        - name: public
          persistentVolumeClaim:
            claimName: dawarich-public
        - name: watched
          persistentVolumeClaim:
            claimName: dawarich-watched
        - name: storage
          persistentVolumeClaim:
            claimName: dawarich-storage
