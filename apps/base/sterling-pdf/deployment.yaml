apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stirling-pdf-repo
  namespace: flux-system
spec:
  interval: 24h
  url: https://stirling-tools.github.io/Stirling-PDF-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sterling-pdf
  namespace: sterling-pdf
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: cert-manager.io/Certificate/cert-manager/wildcard-f4mily-net
spec:
  interval: 1h
  timeout: 30m
  # stirling-pdf-chart renders ingress TLS hosts but drops values.ingress.tls.secretName
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: networking.k8s.io
              version: v1
              kind: Ingress
            patch: |
              - op: add
                path: /spec/tls/0/secretName
                value: wildcard-f4mily-net-tls
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    remediation:
      retries: 3
  targetNamespace: sterling-pdf
  chart:
    spec:
      chart: stirling-pdf-chart
      version: "3.1.0"
      sourceRef:
        kind: HelmRepository
        name: stirling-pdf-repo
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      repository: stirlingtools/stirling-pdf
      tag: "2.11.0"
    envs:
      - name: DOCKER_ENABLE_SECURITY
        value: "false"
      - name: SECURITY_ENABLELOGIN
        value: "false"
    service:
      type: ClusterIP
      externalPort: 8080
    persistence:
      enabled: true
      storageClass: truenas-iscsi
      accessMode: ReadWriteOnce
      size: 8Gi
      path: /configs
    securityContext:
      enabled: true
      fsGroup: 1000
    probes:
      # stirling-pdf takes 2-3 minutes to initialise the JVM + LibreOffice
      # backend on first start. Use a generous startup probe so liveness
      # only kicks in once the app is actually responsive.
      startup:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 40
      liveness:
        enabled: true
        initialDelaySeconds: 0
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 5
      readiness:
        enabled: true
        initialDelaySeconds: 0
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 10
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Sterling PDF
        gethomepage.dev/description: PDF tools
        gethomepage.dev/group: Office
        gethomepage.dev/icon: stirling-pdf.png
        gethomepage.dev/app: stirling-pdf-chart
        # TLS: wildcard-f4mily-net-tls replicated from cert-manager (reflector)
        nginx.org/ssl-redirect: "false"
        nginx.org/redirect-to-https: "true"
      hosts:
        - name: pdf.f4mily.net
          path: /
          tls: true
      tls:
        - secretName: wildcard-f4mily-net-tls
          hosts:
            - pdf.f4mily.net
