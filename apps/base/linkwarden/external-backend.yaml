# Proxy to prod Traefik (Docker Swarm) until in-cluster Linkwarden is deployed.
# prod Traefik routes by Host header; backend is HTTP :80 on 192.168.10.244.
apiVersion: v1
kind: Service
metadata:
  name: linkwarden
  namespace: linkwarden
spec:
  ports:
    - name: http
      port: 3000
      protocol: TCP
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: linkwarden
  namespace: linkwarden
subsets:
  - addresses:
      - ip: 192.168.10.244
    ports:
      - name: http
        port: 80
        protocol: TCP
