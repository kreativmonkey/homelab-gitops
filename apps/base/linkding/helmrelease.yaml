apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  interval: 1h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkding
      # renovate: datasource=helm registryUrl=https://rubxkube.github.io/charts depName=linkding
      version: "1.1.21"
      sourceRef:
        kind: HelmRepository
        name: rubxkube-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: linkding-authentik-oauth
      valuesKey: client-id
      targetPath: common.variables.secret.OIDC_RP_CLIENT_ID
    - kind: Secret
      name: linkding-authentik-oauth
      valuesKey: client-secret
      targetPath: common.variables.secret.OIDC_RP_CLIENT_SECRET
  values:
    common:
      deployment:
        cpuRequest: 25m
        memoryRequest: 128Mi
        memoryLimit: 512Mi
      ingress:
        enabled: false
      persistence:
        enabled: true
        volumes:
          - name: data
            containerMount: /etc/linkding/data
            size: 5Gi
            storageClassName: truenas-iscsi
      variables:
        nonSecret:
          TZ: Europe/Berlin
          # OIDC
          LD_ENABLE_OIDC: "True"
          OIDC_OP_AUTHORIZATION_ENDPOINT: https://login.f4mily.net/application/o/linkding/authorize/
          OIDC_OP_TOKEN_ENDPOINT: https://login.f4mily.net/application/o/linkding/token/
          OIDC_OP_USER_ENDPOINT: https://login.f4mily.net/application/o/linkding/userinfo/
          OIDC_OP_JWKS_ENDPOINT: https://login.f4mily.net/application/o/linkding/jwks/
          OIDC_RP_SCOPES: openid profile email
          OIDC_USERNAME_CLAIM: preferred_username
          LD_CSRF_TRUSTED_ORIGINS: https://bookmarks.f4mily.net
