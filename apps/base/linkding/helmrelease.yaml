apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  interval: 1h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkding
      version: "1.1.21"
      sourceRef:
        kind: HelmRepository
        name: rubxkube-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: linkding-authentik-oauth
      valuesKey: client-id
      targetPath: common.variables.secret.data.OIDC_RP_CLIENT_ID
    - kind: Secret
      name: linkding-authentik-oauth
      valuesKey: client-secret
      targetPath: common.variables.secret.data.OIDC_RP_CLIENT_SECRET
  values:
    common:
      deployment:
        cpuRequest: 25m
        memoryRequest: 128Mi
        memoryLimit: 512Mi
        # RWO PVC can only attach to one node at a time.
        # maxSurge=0 ensures old pod is killed first during rolling updates,
        # preventing deadlock where new pod on a different node can't mount volume.
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
      ingress:
        enabled: false
      persistence:
        enabled: true
        volumes:
          - name: data
            containerMount: /etc/linkding/data
            size: 5Gi
            storageClassName: truenas-iscsi
      variables:
        nonSecret:
          TZ: Europe/Berlin
          # OIDC — endpoints from discovery:
          # curl -sS https://login.f4mily.net/application/o/linkding/.well-known/openid-configuration
          LD_ENABLE_OIDC: "True"
          OIDC_OP_AUTHORIZATION_ENDPOINT: https://login.f4mily.net/application/o/authorize/
          OIDC_OP_TOKEN_ENDPOINT: https://login.f4mily.net/application/o/token/
          OIDC_OP_USER_ENDPOINT: https://login.f4mily.net/application/o/userinfo/
          OIDC_OP_JWKS_ENDPOINT: https://login.f4mily.net/application/o/linkding/jwks/
          OIDC_RP_SCOPES: openid profile email
          OIDC_USERNAME_CLAIM: preferred_username
          LD_CSRF_TRUSTED_ORIGINS: https://bookmarks.f4mily.net
