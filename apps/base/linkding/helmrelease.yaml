apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  interval: 1h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkding
      # renovate: datasource=helm registryUrl=https://rubxkube.github.io/charts depName=linkding
      version: "1.1.21"
      sourceRef:
        kind: HelmRepository
        name: rubxkube-repo
        namespace: flux-system
  values:
    common:
      ingress:
        enabled: false
      persistence:
        enabled: true
        volumes:
          - name: data
            containerMount: /etc/linkding/data
            size: 5Gi
            storageClassName: truenas-iscsi
      variables:
        nonSecret:
          TZ: Europe/Berlin
