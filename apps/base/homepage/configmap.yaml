apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    ---
    title: "Homelab Dashboard"
    language: "de"
  kubernetes.yaml: |
    mode: cluster
    # Ingresses with gethomepage.dev/* annotations are auto-discovered.
    # Use gethomepage.dev/pod-selector when pods use app= not app.kubernetes.io/name=.
    ingress: true
  services.yaml: |
    ---
    - Infrastructure:
        - Opnsense Firewall:
            icon: opnsense.png
            href: "https://opnsense.f4mily.net"
            external: true
            description: Network Firewall & Router
            ping: https://opnsense.f4mily.net

        - Proxmox VE:
            icon: proxmox.png
            href: "https://192.168.10.5:8006"
            external: true
            description: Virtualization Platform
            ping: https://192.168.10.5:8006

        - VictoriaMetrics:
            icon: victoriametrics.png
            href: "https://metrics.cluster.f4mily.net"
            external: true
            description: Monitoring & Metrics
            ping: https://metrics.cluster.f4mily.net

        - Kite:
            icon: kubernetes.png
            href: "https://kite.cluster.f4mily.net"
            external: true
            description: Kubernetes Dashboard
            ping: https://kite.cluster.f4mily.net

        - Longhorn:
            icon: longhorn.png
            href: "https://longhorn.cluster.f4mily.net"
            external: true
            description: Distributed Storage
            ping: https://longhorn.cluster.f4mily.net
        - FritzBox:
            icon: fritzbox.png
            href: "http://192.168.10.158"
            external: false
            description: SIP Server
            ping: http://192.168.10.158
        - HP-2520G-8-PoE-Switch:
            icon: hp.png
            href: "http://192.168.10.201"
            external: false
            description: Network Switch
            ping: http://192.168.10.201
        - HP-2530-24G-PoE-Switch:
            icon: hp.png
            href: "http://192.168.10.200"
            external: false
            description: Network Switch
            ping: http://192.168.10.200

    - Office:
        - Sterling PDF:
            icon: stirling-pdf.png
            href: "https://pdf.f4mily.net"
            external: true
            description: PDF Tools
            ping: https://pdf.f4mily.net
        - Nextcloud:
            icon: nextcloud.png
            href: "https://nextcloud.cluster.f4mily.net"
            external: true
            description: File Sharing & Sync
            ping: https://nextcloud.cluster.f4mily.net
    
    - Survillance:
        - Frigate:
            icon: frigate.png
            href: "https://frigate.f4mily.net"
            external: true
            description: NVR & Object Detection
            ping: https://frigate.f4mily.net
        - Akuvox S563 Intercom:
            icon: mdi-doorbell-video
            href: "http://192.168.10.212"
            external: false
            description: Intercom System
            ping: http://192.168.10.212
        - Akuvox C313V2 Intercom:
            icon: mdi-doorbell-video
            href: "http://192.168.10.211"
            external: false
            description: Intercom System
            ping: http://192.168.10.211
        - Akuvox E12W Doorphone:
            icon: mdi-doorbell-video
            href: "http://192.168.10.210"
            external: false
            description: Doorphone System
            ping: http://192.168.10.210

    - Energy:
        - WarpCharger 3:
            icon: mdi-ev-station
            href: "http://192.168.10.49"
            external: true
            description: EV Charger Management
            ping: http://192.168.10.49
        - EVCC:
            icon: evcc.png
            href: "http://192.168.10.234:7070"
            external: true
            description: EV Charger Management
            ping: "http://192.168.10.234:7070"
        - RS485 RTU Gateway:
            icon: mdi-serial-port
            href: "http://192.168.10.34"
            external: true
            description: RS485 Modbus Gateway
            ping: http://192.168.10.34

    - Sensoren:
        - Home Assistant:
            icon: home-assistant.png
            href: "https://ha.f4mily.net"
            external: true
            description: Home Automation & Sensor Data
            ping: https://ha.f4mily.net
        - GW1200A Sensor Gateway:
            icon: mdi-weather-partly-cloudy
            href: "http://192.168.10.153"
            external: true
            description: Sensor Gateway
            ping: http://192.168.10.153
  widgets.yaml: |
    ---
    - search:
        provider: custom
        url: https://search.f4mily.net/search?q=
        focus: true
    - datetime:
        locale: de
        format:
          timeStyle: short
          dateStyle: short
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homelab
        nodes:
          show: false
          cpu: false
          memory: false
          showLabel: false
  bookmarks.yaml: |
    ---
