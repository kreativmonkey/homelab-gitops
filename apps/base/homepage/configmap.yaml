apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  custom.css: ""
  custom.js: ""
  docker.yaml: |
    ---
  settings.yaml: |
    ---
    title: "Homelab Dashboard"
    language: "de"
    # Eager stats fire ~2×N parallel /api/kubernetes/* calls; intermittent 500 responses
    # ({error: ...} without stats) crash Homepage v1.13.1 (stats.cpuLimit). Stats on click still work.
    showStats: false
    statusStyle: dot
    # Cache settings to reduce API server load.
    cache:
      kubernetes: 60
  kubernetes.yaml: |
    mode: cluster
    # Filter namespaces to reduce object count and API pressure.
    namespaces:
      - default
      - monitoring
      - ingress-nginx
      - cnpg-system
      - homepage
      - authentik
      - forgejo
      - goloom
      - tandoor
      - n8n
      - gatus
      - linkding
    # Enable Ingress discovery.
    ingress: true
  bookmarks.yaml: |
    ---
    - Develope:
        - Gitops Homelab:
            - abbr: GH
              href: https://github.com/kreativmonkey/homelab-gitops
    - Social:
        - Jit.social:
            - icon: mastodon.png
              href: https://jit.social
              description: Radiotux und Binärgewitter
  services.yaml: |
    ---
    - Infrastructure:
        - Opnsense Firewall:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/opnsense.png
            href: "https://opnsense.f4mily.net"
            external: true
            description: Network Firewall & Router
            ping: https://opnsense.f4mily.net
        - Adguard Home:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/adguard-home-central-manager.svg
            href: "https://192.168.10.1:3000"
            external: true
            description: Network-wide Ad Blocker
            ping: https://192.168.10.1:3000
            widget:
              type: adguard
              url: https://192.168.10.1:3000
              username: "{{HOMEPAGE_VAR_ADGUARD_USERNAME}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}"
        - Proxmox VE:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/proxmox.png
            href: "https://192.168.10.5:8006"
            external: true
            description: Virtualization Platform
            ping: https://192.168.10.5:8006
        - Truenas Scale:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/truenas.png
            href: "http://192.168.10.94"
            external: true
            description: Network Attached Storage
            ping: http://192.168.10.94"
        - Garage S3 Controller:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/garage.svg
            href: "http://192.168.10.94:30186"
            external: true
            description: Garage S3 Controller
            ping: http://192.168.10.94:30186
        - FritzBox:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/fritzbox.png
            href: "http://192.168.10.158"
            external: false
            description: SIP Server
            ping: http://192.168.10.158
        - HP-2520G-8-PoE-Switch:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/hp.png
            href: "http://192.168.10.201"
            external: false
            description: Network Switch
            ping: http://192.168.10.201
        - HP-2530-24G-PoE-Switch:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/hp.png
            href: "http://192.168.10.200"
            external: false
            description: Network Switch
            ping: http://192.168.10.200

    - Survillance:
        - Frigate:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/frigate.png
            href: "https://frigate.f4mily.net"
            external: true
            description: NVR & Object Detection
            ping: https://frigate.f4mily.net
        - Akuvox S563 Intercom:
            icon: mdi-doorbell-video
            href: "http://192.168.10.212"
            external: false
            description: Intercom System
            ping: http://192.168.10.212
        - Akuvox C313V2 Intercom:
            icon: mdi-doorbell-video
            href: "http://192.168.10.211"
            external: false
            description: Intercom System
            ping: http://192.168.10.211
        - Akuvox E12W Doorphone:
            icon: mdi-doorbell-video
            href: "http://192.168.10.210"
            external: false
            description: Doorphone System
            ping: http://192.168.10.210

    - Energy:
        - WarpCharger 3:
            icon: mdi-ev-station
            href: "http://192.168.10.49"
            external: true
            description: EV Charger Management
            ping: http://192.168.10.49
        - EVCC:
            icon: evcc.png
            href: "http://192.168.10.234:7070"
            external: true
            description: EV Charger Management
            ping: "http://192.168.10.234:7070"
        - RS485 RTU Gateway:
            icon: mdi-serial-port
            href: "http://192.168.10.34"
            external: true
            description: RS485 Modbus Gateway
            ping: http://192.168.10.34

    - Sensoren:
        - Home Assistant:
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/home-assistant.png
            href: "https://ha.f4mily.net"
            external: true
            description: Home Automation & Sensor Data
            ping: https://ha.f4mily.net
        - GW1200A Sensor Gateway:
            icon: mdi-weather-partly-cloudy
            href: "http://192.168.10.153"
            external: true
            description: Sensor Gateway
            ping: http://192.168.10.153
  widgets.yaml: |
    ---
    - search:
        provider: custom
        url: https://search.f4mily.net/search?q=
        focus: true
    - datetime:
        locale: de
        format:
          timeStyle: short
          dateStyle: short
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homelab
        nodes:
          show: false
          cpu: false
          memory: false
          showLabel: false
        # Increase timeout for Kubernetes API calls.
        timeout: 10000
