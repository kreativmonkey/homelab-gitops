apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
      annotations:
        # Bump to force rollout when only ConfigMap content changes.
        config-version: "2026-05-21"
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: copy-config
        image: busybox:1.37
        command:
          - sh
          - -c
          - |
            cp /tmp/config/* /app/config/ 2>/dev/null || true
            mkdir -p /app/config/logs
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: config-source
          mountPath: /tmp/config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v1.13.1
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "$(MY_POD_IP):3000,home.f4mily.net,localhost"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Berlin"
        startupProbe:
          httpGet:
            path: /api/healthcheck
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /api/healthcheck
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        volumeMounts:
        - name: config
          mountPath: /app/config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 512Mi
      volumes:
      - name: config
        emptyDir: {}
      - name: config-source
        configMap:
          name: homepage-config
      priorityClassName: homelab-infrastructure
