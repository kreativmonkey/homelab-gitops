apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
      annotations:
        # Bump to force rollout when only ConfigMap content changes.
        config-version: "2026-05-20"
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v1.13.1
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "$(MY_POD_IP):3000,home.f4mily.net"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Berlin"
        livenessProbe:
          httpGet:
            path: /api/healthcheck
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: homepage-config
          mountPath: /app/config/kubernetes.yaml
          subPath: kubernetes.yaml
        - name: homepage-config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: homepage-config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: homepage-config
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: homepage-config
          mountPath: /app/config/bookmarks.yaml
          subPath: bookmarks.yaml
        - name: homepage-config
          mountPath: /app/config/docker.yaml
          subPath: docker.yaml
        - name: logs
          mountPath: /app/config/logs
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 256Mi
      volumes:
      - name: homepage-config
        configMap:
          name: homepage-config
      - name: logs
        emptyDir: {}
      priorityClassName: homelab-infrastructure
