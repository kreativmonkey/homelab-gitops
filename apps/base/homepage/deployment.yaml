apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: copy-config
        image: busybox:1.36
        command: ['sh', '-c', 'cp /tmp/config/* /app/config/ 2>/dev/null || true']
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: config-source
          mountPath: /tmp/config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v1.11.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "home.cluster.f4mily.net"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Berlin"
        volumeMounts:
        - name: config
          mountPath: /app/config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 50Mi
      volumes:
      - name: config
        emptyDir: {}
      - name: config-source
        configMap:
          name: homepage-config
      priorityClassName: homelab-infrastructure
