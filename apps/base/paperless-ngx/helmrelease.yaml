apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-paperless
spec:
  interval: 1h
  timeout: 15m
  postRenderers:
    - kustomize:
        patches:
          # Static NFS PVs (nfs-media-static has no provisioner — bind by volumeName).
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: paperless-ngx-data
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-data-documents
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: paperless-ngx-media
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-media-documents
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: paperless-ngx-export
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-export-documents
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: paperless-ngx
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: paperless-ngx
              spec:
                template:
                  spec:
                    containers:
                      - name: paperless-ngx
                        volumeMounts:
                          - name: data
                            mountPath: /usr/src/paperless/data
                            subPath: paperless/data
                          - name: media
                            mountPath: /usr/src/paperless/media
                            subPath: paperless/media
                          - name: export
                            mountPath: /usr/src/paperless/export
                            subPath: paperless/export
                          - name: consume
                            mountPath: /usr/src/paperless/consume
                            subPath: paperless/consume
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: paperless-ngx
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: consume
                  persistentVolumeClaim:
                    claimName: paperless-ngx-consume
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: redis
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: redis
              spec:
                template:
                  spec:
                    containers:
                      - name: redis
                        volumeMounts:
                          - name: data
                            mountPath: /data
                    volumes:
                      - name: data
                        emptyDir: {}
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: paperless-ngx
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 50m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: redis
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    memory: 256Mi
              - op: replace
                path: /spec/replicas
                value: 1
  chart:
    spec:
      chart: paperless-ngx
      version: "0.0.3"
      sourceRef:
        kind: HelmRepository
        name: breuerfelix-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-paperless
      valuesKey: password
      targetPath: paperless.env[4].value
  values:
    paperless:
      env:
        - name: PAPERLESS_DBHOST
          value: homelab-postgres-rw.cnpg-system.svc.cluster.local
        - name: PAPERLESS_DBPORT
          value: "5432"
        - name: PAPERLESS_DBNAME
          value: paperless
        - name: PAPERLESS_DBUSER
          value: paperless
        - name: PAPERLESS_DBPASS
          value: ""
        - name: PAPERLESS_REDIS
          value: redis://redis:80
        - name: PAPERLESS_TIME_ZONE
          value: Europe/Berlin
        - name: PAPERLESS_OCR_LANGUAGE
          value: eng
        - name: PAPERLESS_ALLOWED_HOSTS
          value: paperless.f4mily.net
        - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
          value: https://paperless.f4mily.net
        - name: PAPERLESS_TASK_WORKERS
          value: "2"
        - name: PAPERLESS_THREADS_PER_WORKER
          value: "1"
        - name: PAPERLESS_CONSUMER_POLLING
          value: "60"
        - name: PAPERLESS_TIKA_ENABLED
          value: "1"
        - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
          value: http://gotenberg:3000
        - name: PAPERLESS_TIKA_ENDPOINT
          value: http://tika:9998
        - name: PAPERLESS_CONSUMER_ENABLE_BARCODES
          value: "true"
        - name: PAPERLESS_CONSUMER_ENABLE_ASN_BARCODE
          value: "true"
        - name: PAPERLESS_CONSUMER_ENABLE_TAG_BARCODE
          value: "true"
        - name: PAPERLESS_CONSUMER_TAG_BARCODE_MAPPING
          value: '{ "ASN13.*": "Hausbau" }'
        - name: PAPERLESS_APPS
          value: allauth.socialaccount.providers.openid_connect
        - name: PAPERLESS_LOGOUT_REDIRECT_URL
          value: https://login.f4mily.net/application/o/paperless/end-session/
        - name: PAPERLESS_SOCIAL_AUTO_SIGNUP
          value: "true"
        - name: PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS
          value: "true"
      ingress:
        enabled: false
      volumes:
        - name: data
          path: /usr/src/paperless/data
          size: 5Gi
          storageClassName: nfs-media-static
        - name: media
          path: /usr/src/paperless/media
          size: 15Gi
          storageClassName: nfs-media-static
        - name: export
          path: /usr/src/paperless/export
          size: 20Gi
          storageClassName: nfs-media-static
      secretRefs:
        - key: PAPERLESS_SECRET_KEY
          name: paperless-ngx
        - key: PAPERLESS_URL
          name: paperless-ngx
        - key: PAPERLESS_SOCIALACCOUNT_PROVIDERS
          name: paperless-ngx-integrations
    redis:
      volumes:
        - name: data
          path: /data
          size: 5Gi
          storageClassName: nfs-media-static
