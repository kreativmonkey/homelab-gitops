apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-paperless
spec:
  interval: 1h
  timeout: 15m
  postRenderers:
    - kustomize:
        patches:
          # Static NFS PVs (nfs-media-static has no provisioner — bind by volumeName).
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: paperless-ngx-data
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-data
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: paperless-ngx-media
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-media
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: paperless-ngx-export
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-export
          - target:
              version: v1
              kind: PersistentVolumeClaim
              name: redis-data
            patch: |
              - op: add
                path: /spec/volumeName
                value: pv-nfs-paperless-redis
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: paperless-ngx
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: paperless-ngx
              spec:
                template:
                  spec:
                    containers:
                      - name: paperless-ngx
                        volumeMounts:
                          - name: data
                            subPath: paperless/data
                          - name: media
                            subPath: paperless/media
                          - name: export
                            subPath: paperless/export
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: redis
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: redis
              spec:
                template:
                  spec:
                    containers:
                      - name: redis
                        volumeMounts:
                          - name: data
                            subPath: paperless/redis
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: paperless-ngx
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 50m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: redis
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    memory: 256Mi
              - op: replace
                path: /spec/replicas
                value: 1
  chart:
    spec:
      chart: paperless-ngx
      version: "0.0.3"
      sourceRef:
        kind: HelmRepository
        name: breuerfelix-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-paperless
      valuesKey: password
      targetPath: paperless.env[4].value
  values:
    paperless:
      env:
        - name: PAPERLESS_DBHOST
          value: homelab-postgres-rw.cnpg-system.svc.cluster.local
        - name: PAPERLESS_DBPORT
          value: "5432"
        - name: PAPERLESS_DBNAME
          value: paperless
        - name: PAPERLESS_DBUSER
          value: paperless
        - name: PAPERLESS_DBPASS
          value: ""
        - name: PAPERLESS_REDIS
          value: redis://redis:80
        - name: PAPERLESS_TIME_ZONE
          value: Europe/Berlin
        - name: PAPERLESS_OCR_LANGUAGE
          value: eng
      ingress:
        enabled: false
      volumes:
        - name: data
          path: /usr/src/paperless/data
          size: 5Gi
          storageClassName: nfs-media-static
        - name: media
          path: /usr/src/paperless/media
          size: 15Gi
          storageClassName: nfs-media-static
        - name: export
          path: /usr/src/paperless/export
          size: 20Gi
          storageClassName: nfs-media-static
      secretRefs:
        - key: PAPERLESS_SECRET_KEY
          name: paperless-ngx
        - key: PAPERLESS_URL
          name: paperless-ngx
    redis:
      volumes:
        - name: data
          path: /data
          size: 5Gi
          storageClassName: nfs-media-static
