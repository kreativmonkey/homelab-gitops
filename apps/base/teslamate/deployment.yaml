apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate
  namespace: teslamate
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-teslamate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: teslamate
  template:
    metadata:
      labels:
        app: teslamate
        app.kubernetes.io/name: teslamate
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: teslamate
          # Pin version (DB already on 3.x migrations); bump via Renovate, not :latest.
          image: docker.io/teslamate/teslamate:3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          # Load ENCRYPTION_KEY from file so the value is never treated as a path (keys may start with "/").
          command:
            - /bin/dash
            - -ec
            - |
              export ENCRYPTION_KEY="$(tr -d '\n\r' </etc/teslamate/encryption_key)"
              exec tini -- /entrypoint.sh bin/teslamate start
          envFrom:
            - configMapRef:
                name: teslamate-config
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-teslamate
                  key: username
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-teslamate
                  key: password
            - name: DATABASE_NAME
              value: teslamate
            - name: DATABASE_HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: CHECK_ORIGIN
              value: "false"
            - name: VIRTUAL_HOST
              value: teslamate.cluster.f4mily.net
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10001
          volumeMounts:
            - name: import
              mountPath: /opt/app/import
            - name: encryption-key
              mountPath: /etc/teslamate
              readOnly: true
      volumes:
        - name: import
          emptyDir: {}
        - name: encryption-key
          secret:
            secretName: teslamate-app
            items:
              - key: ENCRYPTION_KEY
                path: encryption_key
            # defaultMode 0644: readable by container user (nonroot 10000); 0400 would be root-only.
