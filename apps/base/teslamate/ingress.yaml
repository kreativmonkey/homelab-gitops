apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teslamate
  namespace: teslamate
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Teslamate
    gethomepage.dev/description: Tesla logging (Grafana at /grafana/)
    gethomepage.dev/href: "https://teslamate.f4mily.net/"
    gethomepage.dev/group: Energy
    gethomepage.dev/icon: teslamate.png
    gethomepage.dev/app: teslamate
    gethomepage.dev/pod-selector: app=teslamate
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    # Phoenix LiveView (/live/websocket) + Grafana Live (/grafana/api/live/)
    nginx.org/websocket-services: "teslamate,teslamate-grafana"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - teslamate.f4mily.net
      secretName: wildcard-f4mily-net-tls
  rules:
    - host: teslamate.f4mily.net
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: teslamate-grafana
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teslamate
                port:
                  number: 4000
