apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teslamate
  namespace: teslamate
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Teslamate
    gethomepage.dev/description: Tesla logging
    gethomepage.dev/group: Energy
    gethomepage.dev/icon: teslamate.png
    gethomepage.dev/app: teslamate
    gethomepage.dev/pod-selector: app=teslamate
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    # Phoenix LiveView (/live/websocket)
    nginx.org/websocket-services: "teslamate"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - teslamate.cluster.f4mily.net
      secretName: wildcard-cluster-f4mily-net-tls
  rules:
    - host: teslamate.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teslamate
                port:
                  number: 4000
