# Home Assistant / LAN clients (production published host:1883).
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-external
  namespace: teslamate
spec:
  type: ClusterIP
  externalIPs:
    - 192.168.10.245
  selector:
    app: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
