apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.35.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "Europe/Berlin"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            # PV mounts export root /mnt/Storagepool/Media — subPath = path under /mnt/truenas/Media
            - name: config
              mountPath: /config
              subPath: docker/audiobookshelf/config
            - name: metadata
              mountPath: /metadata
              subPath: docker/audiobookshelf/metadata
            - name: audiobooks
              mountPath: /audiobooks
              subPath: MediaStack/media/audiobooks
            - name: podcasts
              mountPath: /podcasts
              subPath: MediaStack/media/podcasts
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: audiobookshelf-config
        - name: metadata
          persistentVolumeClaim:
            claimName: audiobookshelf-metadata
        - name: audiobooks
          persistentVolumeClaim:
            claimName: audiobookshelf-audiobooks
        - name: podcasts
          persistentVolumeClaim:
            claimName: audiobookshelf-podcasts
---
apiVersion: v1
kind: Service
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    app: audiobookshelf
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Audiobookshelf
    gethomepage.dev/description: Audiobooks
    gethomepage.dev/group: Medien
    gethomepage.dev/icon: audiobookshelf.png
    # TLS: wildcard-f4mily-net-tls replicated from cert-manager (reflector).
    # Do not use cert-manager.io/cluster-issuer — ingress-shim conflicts with reflector.
    nginx.org/client-max-body-size: "1000m"
    nginx.org/ssl-redirect: "true"
    nginx.org/websocket-services: "audiobookshelf"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
    # v2.18+ client is built for /audiobookshelf; redirect / without server-snippets.
    nginx.org/app-root: /audiobookshelf
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - audible.f4mily.net
      secretName: wildcard-f4mily-net-tls
  rules:
    - host: audible.f4mily.net
      http:
        paths:
          - path: /audiobookshelf
            pathType: Prefix
            backend:
              service:
                name: audiobookshelf
                port:
                  number: 80
