apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  chart:
    spec:
      chart: renovate
      version: "46.240.1"
      sourceRef:
        kind: HelmRepository
        name: renovate-repo
        namespace: flux-system
  values:
    cronjob:
      schedule: "0 */4 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 1
      jobBackoffLimit: 1
      ttlSecondsAfterFinished: 86400

    renovate:
      # GitHub token via RENOVATE_GITHUB_COM_TOKEN in renovate-credentials (existingSecret).
      config: |
        {
          "platform": "gitea",
          "endpoint": "http://forgejo-app.forgejo.svc.cluster.local:3000/api/v1/",
          "autodiscover": true,
          "autodiscoverFilter": ["homelab/*", "Homelab/*", "kreativmonkey/*", "diyon/*"],
          "gitAuthor": "Renovate Bot <renovate@f4mily.net>",
          "onboarding": true,
          "onboardingConfig": {
            "extends": ["config:recommended", ":dependencyDashboard"]
          },
          "timezone": "Europe/Berlin",
          "persistRepoData": true
        }

      persistence:
        cache:
          enabled: true
          storageClass: truenas-iscsi
          storageSize: "10Gi"

    existingSecret: renovate-credentials

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi
