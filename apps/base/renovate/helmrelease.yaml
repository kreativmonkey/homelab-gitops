apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  chart:
    spec:
      chart: renovate
      # renovate: datasource=helm registryUrl=https://docs.renovatebot.com/helm-charts depName=renovate
      version: "46.160.5"
      sourceRef:
        kind: HelmRepository
        name: renovate-repo
        namespace: flux-system
  values:
    cronjob:
      schedule: "0 */4 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 1
      jobBackoffLimit: 1
      ttlSecondsAfterFinished: 86400

    image:
      tag: "40.49.0"

    renovate:
      configEnableHelmTpl: true
      config: |
        {
          "platform": "forgejo",
          "endpoint": "http://forgejo-app.forgejo.svc.cluster.local:3000/api/v1/",
          "autodiscover": true,
          "autodiscoverFilter": ["homelab/*", "Homelab/*", "kreativmonkey/*", "diyon/*"],
          "gitAuthor": "Renovate Bot <renovate@f4mily.net>",
          "onboarding": true,
          "onboardingConfig": {
            "extends": ["config:recommended", ":dependencyDashboard"]
          },
          "timezone": "Europe/Berlin",
          "persistRepoData": true,
          "hostRules": [
            {
              "matchHost": "github.com",
              "token": "{{ .Env.RENOVATE_GITHUB_COM_TOKEN }}"
            },
            {
              "matchHost": "api.github.com",
              "token": "{{ .Env.RENOVATE_GITHUB_COM_TOKEN }}"
            }
          ]
        }

      persistence:
        cache:
          enabled: true
          storageClass: truenas-iscsi
          storageSize: "2Gi"

    existingSecret: renovate-credentials

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi
