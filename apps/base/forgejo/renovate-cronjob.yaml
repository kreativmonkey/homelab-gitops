apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: forgejo
spec:
  schedule: "0 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: renovate
              # renovate: datasource=docker depName=renovate/renovate versioning=semver
              image: renovate/renovate:40.49.0
              env:
                - name: TZ
                  value: Europe/Berlin
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config.js
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-credentials
                      key: RENOVATE_TOKEN
                - name: RENOVATE_GITHUB_COM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-credentials
                      key: RENOVATE_GITHUB_COM_TOKEN
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: config
                  mountPath: /usr/src/app/config.js
                  subPath: config.js
                  readOnly: true
                - name: data
                  mountPath: /tmp/renovate
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: data
              persistentVolumeClaim:
                claimName: renovate-data
