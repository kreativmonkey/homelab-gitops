apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: forgejo
spec:
  schedule: "0 3 * * *" # daily at 03:00 UTC (adjust for Europe/Berlin)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
            app.kubernetes.io/part-of: forgejo
        spec:
          restartPolicy: OnFailure
          containers:
            - name: renovate
              image: renovate/renovate:latest
              env:
                - name: RENOVATE_GITHUB_COM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-github-com-token
                      key: token
                - name: RENOVATE_PLATFORM
                  value: "forgejo"
                - name: RENOVATE_ENDPOINT
                  value: "http://server:3000/api/v1"
                - name: LOG_LEVEL
                  value: "debug"
                - name: TZ
                  value: "Europe/Berlin"
              volumeMounts:
                - name: renovate-config
                  mountPath: /home/ajv/renovate_config
                - name: renovate-data
                  mountPath: /data
              command: ["renovate", "--config", "/home/ajv/renovate_config/renovate-config.js"]
              resources:
                limits:
                  memory: "512Mi"
                  cpu: "200m"
          volumes:
            - name: renovate-config
              configMap:
                name: renovate-config
            - name: renovate-data
              persistentVolumeClaim:
                claimName: renovate-data
          imagePullPolicy: IfNotPresent