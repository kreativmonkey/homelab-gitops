apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
        app.kubernetes.io/name: forgejo
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          env:
            - name: TZ
              value: Europe/Berlin
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            # CORS für browserbasierte OAuth2-PKCE-Clients (Sveltia CMS):
            # der Token-Exchange läuft im Browser gegen /login/oauth/access_token
            # und braucht CORS-Header. Bei Bedarf auf die finale Site-Domain
            # einschränken (kommagetrennte Liste statt *).
            - name: GITEA__cors__ENABLED
              value: "true"
            - name: GITEA__cors__ALLOW_DOMAIN
              value: "*"
            - name: GITEA__cache__ADAPTER
              value: redis
            - name: GITEA__cache__HOST
              value: redis://forgejo-redis:6379/0
            - name: GITEA__session__PROVIDER
              value: redis
            - name: GITEA__session__PROVIDER_CONFIG
              value: redis://forgejo-redis:6379/0
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: GITEA__database__PORT
              value: "5432"
            - name: GITEA__database__NAME
              value: forgejo
            - name: GITEA__database__USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-forgejo
                  key: username
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-forgejo
                  key: password
            - name: GITEA__database__SSL_MODE
              value: disable
          # Do not set runAsUser/runAsGroup — the Forgejo image drops privileges via s6.
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
          # Liveness: TCP only — /api/healthz can stall when Postgres is under load.
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: docker/forgejo
            - name: comments-tmpl
              mountPath: /data/gitea/templates/repo/issue/view_content/comments.tmpl
              subPath: comments.tmpl
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
        - name: comments-tmpl
          configMap:
            name: forgejo-comments-tmpl
            defaultMode: 0444
