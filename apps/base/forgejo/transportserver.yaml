# Git SSH on ingress nodes (hostNetwork NGINX): ports 22 and 2222 → forgejo built-in SSH.
# Requires GlobalConfiguration listeners in infrastructure/base/network/ingress/helmrelease.yaml.
apiVersion: k8s.nginx.org/v1
kind: TransportServer
metadata:
  name: forgejo-ssh-22
  namespace: forgejo
spec:
  ingressClassName: nginx
  listener:
    name: forgejo-ssh-22
    protocol: TCP
  upstreams:
    - name: forgejo-ssh
      service: forgejo-ssh
      port: 22
  action:
    pass: forgejo-ssh
---
apiVersion: k8s.nginx.org/v1
kind: TransportServer
metadata:
  name: forgejo-ssh-2222
  namespace: forgejo
spec:
  ingressClassName: nginx
  listener:
    name: forgejo-ssh-2222
    protocol: TCP
  upstreams:
    - name: forgejo-ssh
      service: forgejo-ssh
      port: 22
  action:
    pass: forgejo-ssh
