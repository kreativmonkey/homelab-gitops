apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-redis
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-redis
  template:
    metadata:
      labels:
        app: forgejo-redis
    spec:
      containers:
        - name: redis
          # bitnami/redis moved to bitnamilegacy; tag must be full version (7.4 does not exist)
          # renovate: datasource=docker depName=docker.io/bitnamilegacy/redis versioning=docker
          image: docker.io/bitnamilegacy/redis:8.2.1-debian-12-r0
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "yes"
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-redis
  namespace: forgejo
spec:
  selector:
    app: forgejo-redis
  ports:
    - port: 6379
      targetPort: redis
