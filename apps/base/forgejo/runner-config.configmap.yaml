apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |
    log:
      level: info
      job_level: info

    runner:
      # Registration state lives on the PVC (mounted at /data, the image WORKDIR).
      file: /data/.runner
      # Concurrent jobs. The aggregate resource ceiling is enforced by the dind
      # sidecar limits in runner-deployment.yaml, so this can be >1 safely;
      # raise/lower together with the dind cpu/memory limits.
      capacity: 3
      # Per-job hard timeout (Forgejo instance also caps at 3h by default).
      timeout: 1h
      # Grace period for running jobs on shutdown; keep <= the pod's
      # terminationGracePeriodSeconds (130s).
      shutdown_timeout: 2m
      fetch_timeout: 5s
      fetch_interval: 2s
      report_interval: 1s
      # Must match RUNNER_LABELS in runner-deployment.yaml.
      labels:
        - docker:docker://node:20-bookworm

    cache:
      # Internal cache server for actions/cache (speeds up e.g. setup-go module
      # and build caches). The cache server listens in the pod network namespace
      # (shared with dind); job containers reach it via the docker0 bridge gateway.
      enabled: true
      # Persist cache data on the runner PVC so it survives pod restarts.
      dir: /data/actcache
      # Address job containers use to reach the cache server. With
      # container.network=bridge below, jobs sit on dind's default bridge whose
      # gateway (172.17.0.1) routes into the pod netns where the server listens.
      host: "172.17.0.1"

    container:
      # Use dind's default bridge so the cache-server gateway IP is deterministic
      # (172.17.0.1). Trade-off vs auto-created per-job networks: no automatic
      # container-name DNS, which only matters for workflows using `services:`.
      network: bridge
      # Job containers themselves are not privileged.
      privileged: false
      # Use the dind sidecar reached via DOCKER_HOST.
      docker_host: "-"
      # No host volumes may be bind-mounted into job containers.
      valid_volumes: []
      force_pull: false
