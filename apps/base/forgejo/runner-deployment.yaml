apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
        app.kubernetes.io/name: forgejo-runner
    spec:
      enableServiceLinks: false
      # The runner image runs as uid/gid 1000, but the iSCSI PVC mounts root-owned.
      # fsGroup 1000 makes /data group-writable so the runner can persist .runner.
      # Set only fsGroup (not runAsUser) at pod level — the dind sidecar must stay root.
      securityContext:
        fsGroup: 1000
        # Only chown volumes whose top-level group differs, so the dind PVC
        # (large image store, root-owned) isn't recursively re-chowned each boot.
        fsGroupChangePolicy: OnRootMismatch
      # CI is best-effort: this pod is the first to be preempted/evicted under
      # node pressure and never preempts other workloads (see runner-priorityclass.yaml).
      priorityClassName: forgejo-runner-low
      # Allow in-flight jobs a short window to finish on rollout/restart
      # (must be >= runner.shutdown_timeout in config.yaml).
      terminationGracePeriodSeconds: 130
      containers:
        - name: runner
          # renovate: datasource=docker depName=data.forgejo.org/forgejo/runner versioning=semver
          # >= 12.10.2 required for node24 JS actions (e.g. actions/checkout@v7).
          image: data.forgejo.org/forgejo/runner:12.11.1
          # The image CMD is only `/bin/forgejo-runner` (prints help and exits),
          # so we drive registration + daemon ourselves. Registration is idempotent:
          # it only runs when /data/.runner (on the PVC) is absent.
          command:
            - /bin/sh
            - -ec
            - |
              if [ ! -f /data/.runner ]; then
                echo "No .runner file found - registering runner with Forgejo..."
                forgejo-runner register --no-interactive \
                  --instance "$GITEA_INSTANCE_URL" \
                  --token "$GITEA_RUNNER_REGISTRATION_TOKEN" \
                  --name "$RUNNER_NAME" \
                  --labels "$RUNNER_LABELS"
              fi
              # Wait for the dind sidecar's Docker API before starting the daemon
              # (it pings docker on startup and exits if unreachable). dind needs
              # more than a few seconds to init storage on first boot.
              echo "Waiting for dind Docker API..."
              i=0
              until wget -q -O /dev/null http://127.0.0.1:2375/_ping 2>/dev/null; do
                i=$((i+1))
                [ "$i" -ge 120 ] && echo "dind not ready after 120s, giving up" && exit 1
                sleep 1
              done
              echo "dind is up."
              exec forgejo-runner daemon --config /config/config.yaml
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: GITEA_INSTANCE_URL
              value: http://forgejo-app.forgejo.svc.cluster.local:3000
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-register
                  key: token
            - name: RUNNER_NAME
              value: talos-cluster
            # Must match runner.labels in runner-config.configmap.yaml.
            - name: RUNNER_LABELS
              value: docker:docker://node:20-bookworm
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config
              readOnly: true
          # Orchestrator only — the actual job workloads run inside the dind
          # sidecar and are bounded by *its* limits, not these.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
        - name: dind
          # renovate: datasource=docker depName=docker.io/library/docker
          image: docker.io/library/docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
          # This is the real cap on all CI jobs combined: every job container the
          # runner starts is nested in this container's cgroup. Sized to use spare
          # node capacity (nodes are 3-6 vCPU / 16Gi) without starving the cluster.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: runner-data
          persistentVolumeClaim:
            claimName: forgejo-runner-data
        - name: runner-config
          configMap:
            name: forgejo-runner-config
        # Persistent Docker image/layer store for dind so pulled images and build
        # layers are cached across pipeline runs instead of re-pulled every time.
        - name: dind-storage
          persistentVolumeClaim:
            claimName: forgejo-runner-dind
