# agentgateway (standalone) — central MCP gateway for the homelab.
#
# One endpoint (mcp.cluster.f4mily.net) that every CLI agent points at instead
# of wiring each MCP server into each tool separately. Aggregated MCP servers
# live here as `targets`; adding one is a Git change, not per-tool config.
#
# Verified against agentgateway v1.3.1 with `--validate-only` and a live
# `tools/list` probe (see README.md → agentgateway). Config schema docs:
# https://agentgateway.dev/docs/standalone/
config:
  mcp:
    # CLI agents hold long interactive sessions; keep them alive a while.
    sessionTtl: 30m

binds:
  - port: 3000
    listeners:
      - routes:
          - policies:
              # MCP clients (Claude Code, OpenCode, …) are browser-less; CORS is
              # permissive because auth is enforced by the JWT layer below, not
              # by origin.
              cors:
                allowOrigins: ["*"]
                allowHeaders:
                  - mcp-protocol-version
                  - content-type
                  - cache-control
                  - mcp-session-id
                  - authorization
                exposeHeaders:
                  - "Mcp-Session-Id"

              # --- Authentication: Authentik as the OIDC issuer ---
              # Turns the gateway into an MCP OAuth "protected resource": it
              # serves /.well-known/oauth-protected-resource/* so spec-compliant
              # clients discover Authentik, and validates the resulting Bearer
              # JWTs against Authentik's JWKS.
              #
              # ORDERING: agentgateway performs OIDC discovery + JWKS fetch on
              # startup. The Authentik application `mcp-gateway` (see
              # apps/base/authentik/blueprints/mcp-gateway-oauth.configmap.yaml)
              # MUST exist and publish a populated JWKS, or this pod crash-loops.
              #
              # NOTE (needs live verification): Authentik is not one of
              # agentgateway's tested provider adapters (keycloak/auth0/okta/
              # descope). It targets the generic spec-compliant path. If the
              # MCP-OAuth discovery flow misbehaves, fall back to NetBird-mesh-
              # only exposure or a static bearer token. See README.
              mcpAuthentication:
                issuer: https://login.f4mily.net/application/o/mcp-gateway/
                audiences:
                  - mcp-gateway
                jwks:
                  url: https://login.f4mily.net/application/o/mcp-gateway/jwks/
                resourceMetadata:
                  resource: https://mcp.cluster.f4mily.net/mcp
                  scopesSupported:
                    - openid
                    - profile
                    - email
                  bearerMethodsSupported:
                    - header

              # --- Upstream (backend) side ---
              # Reach Forgejo's REST API over HTTPS with the system CA bundle.
              backendTLS: {}
              # Inject the Forgejo PAT. Forgejo expects `Authorization: token <PAT>`
              # (not Bearer). $FORGEJO_TOKEN comes from the agentgateway-forgejo
              # Secret (see deployment.yaml env).
              backendAuth:
                key:
                  value: "$FORGEJO_TOKEN"
                  location:
                    header:
                      name: authorization
                      prefix: "token "

            backends:
              - mcp:
                  targets:
                    # Forgejo via OpenAPI→MCP. Forgejo only ships Swagger 2.0
                    # with 491 operations; forgejo-openapi.json is a converted
                    # (3.0) + trimmed subset of curated operations, generated by
                    # scripts/generate-forgejo-openapi.sh. Trimming keeps the
                    # tool list small AND the spec under the 1 MiB ConfigMap
                    # limit. `host` is required and combines with the spec's
                    # /api/v1 basePath.
                    - name: forgejo
                      openapi:
                        schema:
                          file: /cfg/forgejo-openapi.json
                        host: git.f4mily.net
