apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway
  namespace: agentgateway
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: MCP Gateway
    gethomepage.dev/description: Central MCP endpoint for AI agents
    gethomepage.dev/group: Tools
    gethomepage.dev/icon: mdi-robot
    gethomepage.dev/pod-selector: app=agentgateway
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    # MCP uses streamable HTTP / Server-Sent Events: disable response buffering
    # and allow long-lived streams so tool responses aren't held back or cut.
    nginx.org/proxy-buffering: "false"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mcp.cluster.f4mily.net
      secretName: wildcard-cluster-f4mily-net-tls
  rules:
    - host: mcp.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway
                port:
                  number: 3000
