apiVersion: apps/v1
kind: Deployment
metadata:
  name: goloom
  namespace: goloom
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-goloom
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: goloom
  template:
    metadata:
      labels:
        app: goloom
        app.kubernetes.io/name: goloom
    spec:
      # imagePullSecrets:
      #   - name: goloom-registry
      containers:
        - name: goloom
          # Own app image on a self-hosted Forgejo registry with no version tags.
          # Pin to a digest so reschedules cannot silently change the running build;
          # bump the digest on release (CI or manually). No Renovate marker: the
          # private registry is not reliably resolvable by Renovate's docker datasource.
          image: git.f4mily.net/kreativmonkey/goloon:latest@sha256:56b4b3c011de6a4a4dea4027eb6b43042662803a3d1c282cd6c6dff4cbe43a69
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: goloom-config
            - secretRef:
                name: goloom-app
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-goloom
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-goloom
                  key: password
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@homelab-postgres-rw.cnpg-system.svc.cluster.local:5432/goloom?sslmode=disable
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
