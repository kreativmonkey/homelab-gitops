apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: searxng
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "search"
    server:
      port: 8080
      bind_address: "0.0.0.0"
      limiter: false
      image_proxy: false
    search:
      safe_search: 0
      autocomplete: "duckduckgo"
      formats:
        - html
        - json
