apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  # Recreate + RWO PVC; $patch: replace drops stale rollingUpdate after SSA merge.
  strategy:
    $patch: replace
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
        app.kubernetes.io/name: searxng
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 977
        runAsUser: 977
        runAsGroup: 977
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap-config
          image: docker.io/searxng/searxng:2026.6.22-cce0957f5
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              DEST=/mnt/etc/searxng
              if [ ! -f "${DEST}/settings.yml" ]; then
                cp -a /etc/searxng/. "${DEST}/"
              fi
              cp /config/settings.yml "${DEST}/settings.yml"
          securityContext:
            runAsUser: 977
            runAsGroup: 977
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: etc-searxng
              mountPath: /mnt/etc/searxng
            - name: config-source
              mountPath: /config
              readOnly: true
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:2026.6.22-cce0957f5
          imagePullPolicy: IfNotPresent
          env:
            - name: GRANIAN_HOST
              value: "0.0.0.0"
            - name: GRANIAN_PORT
              value: "8080"
            - name: SEARXNG_BASE_URL
              value: "https://search.f4mily.net/"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SEARXNG_SECRET
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: etc-searxng
              mountPath: /etc/searxng
      volumes:
        - name: etc-searxng
          persistentVolumeClaim:
            claimName: searxng-config
        - name: config-source
          configMap:
            name: searxng-settings
            defaultMode: 0644
