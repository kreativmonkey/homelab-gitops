apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
        app.kubernetes.io/name: searxng
    spec:
      securityContext:
        fsGroup: 977
        runAsUser: 977
        runAsGroup: 977
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-valkey
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z valkey 6379; do
                echo "waiting for valkey..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: copy-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              cp /config/settings.yml /etc/searxng/settings.yml
              cp /config/limiter.toml /etc/searxng/limiter.toml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config-source
              mountPath: /config
            - name: config
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:2025.2.7-739822f70
          imagePullPolicy: IfNotPresent
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.f4mily.net/"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SEARXNG_SECRET
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
      volumes:
        - name: config-source
          configMap:
            name: searxng-settings
        - name: config
          emptyDir: {}
