apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      securityContext:
        fsGroup: 977
        runAsUser: 977
        runAsGroup: 977
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:2025.2.7-739822f70
          imagePullPolicy: IfNotPresent
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.f4mily.net/"
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
      volumes:
        - name: config
          configMap:
            name: searxng-settings
