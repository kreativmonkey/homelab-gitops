apiVersion: v1
kind: Service
metadata:
  name: vmselect-kite-prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: homelab-monitoring
spec:
  type: ClusterIP
  selector:
    # VMCluster: vmselect pods expose Prometheus-compatible /metrics on 8481
    app.kubernetes.io/name: vmselect
  ports:
    # Kite auto-discovery expects Prometheus on 8429
    - name: prometheus
      port: 8429
      targetPort: 8481
