apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Teslamate Grafana
    gethomepage.dev/description: Tesla metrics dashboards
    gethomepage.dev/group: Energy
    gethomepage.dev/icon: grafana.png
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
  labels:
    app.kubernetes.io/part-of: vm-k8s-stack
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.cluster.f4mily.net
      secretName: grafana-tls
  rules:
    - host: grafana.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vm-k8s-stack-grafana
                port:
                  number: 80
