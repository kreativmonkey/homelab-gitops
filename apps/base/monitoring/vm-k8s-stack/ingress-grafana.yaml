apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grafana
    gethomepage.dev/description: Cluster dashboards
    gethomepage.dev/group: Infrastructure
    gethomepage.dev/app: grafana
    gethomepage.dev/icon: grafana.png
    # TLS: wildcard-cluster-f4mily-net-tls via reflector (no cluster-issuer).
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
  labels:
    app.kubernetes.io/part-of: vm-k8s-stack
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.cluster.f4mily.net
      secretName: wildcard-cluster-f4mily-net-tls
  rules:
    - host: grafana.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vm-k8s-stack-grafana
                port:
                  number: 80
