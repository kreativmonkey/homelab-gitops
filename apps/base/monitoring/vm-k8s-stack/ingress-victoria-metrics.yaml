apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: victoria-metrics
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: VictoriaMetrics
    gethomepage.dev/description: Metrics DB & VMUI
    gethomepage.dev/group: Cluster Management
    gethomepage.dev/icon: victoriametrics.png
    gethomepage.dev/app: vmsingle
    # TLS: wildcard-cluster-f4mily-net-tls via reflector (no cluster-issuer).
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
  labels:
    app.kubernetes.io/part-of: vm-k8s-stack
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - metrics.cluster.f4mily.net
      secretName: wildcard-cluster-f4mily-net-tls
  rules:
    - host: metrics.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vmsingle-vm-k8s-stack-victoria-metrics-k8s-stack
                port:
                  number: 8428
