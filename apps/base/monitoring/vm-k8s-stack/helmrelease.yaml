apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-k8s-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.72.5"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-repo
        namespace: flux-system
  values:
    global:
      clusterLabel: cluster

    # ============================================
    # VMSINGLE - Storage
    # ============================================
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "1"
        storage:
          storageClassName: longhorn
          resources:
            requests:
              storage: 20Gi
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi
        priorityClassName: homelab-infrastructure
        podMetadata:
          annotations:
            backup.velero.io/backup-volumes: vm-data
      ingress:
        enabled: false

    # ============================================
    # OPERATOR - use quay.io to avoid Docker Hub rate limits
    # ============================================
    victoria-metrics-operator:
      # Avoid install deadlock when operator pod is not up yet (webhook connection refused).
      admissionWebhooks:
        enabled: false
      image:
        registry: quay.io
      env:
        - name: VM_CONFIG_RELOADER_IMAGE
          value: "quay.io/victoriametrics/operator:config-reloader-v0.68.3"
        - name: VM_VMSINGLEDEFAULT_IMAGE
          value: "quay.io/victoriametrics/victoria-metrics"
        - name: VM_VMAGENTDEFAULT_IMAGE
          value: "quay.io/victoriametrics/vmagent"
        - name: VM_VMALERTDEFAULT_IMAGE
          value: "quay.io/victoriametrics/vmalert"
        - name: VM_VMALERTMANAGER_ALERTMANAGERDEFAULTBASEIMAGE
          value: "quay.io/prometheus/alertmanager"

    # ============================================
    # VMAGENT - Scraping & auto-discovery
    # ============================================
    vmagent:
      enabled: true
      spec:
        selectAllByDefault: true
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 512Mi

    # ============================================
    # VMALERT - Alerting
    # ============================================
    vmalert:
      enabled: true
      spec:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

    # ============================================
    # ALERTMANAGER - ntfy via homelab-monitoring topic
    # ============================================
    alertmanager:
      enabled: true
      spec:
        replicaCount: 1
        secrets:
          - alertmanager-ntfy-credentials
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: ntfy-monitoring
          group_by: ["alertname", "namespace", "severity", "cluster"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - matchers:
                - severity=critical
              receiver: ntfy-monitoring
              repeat_interval: 3h
            - matchers:
                - severity=warning
              receiver: ntfy-monitoring
              repeat_interval: 12h
            - matchers:
                - severity=info
              receiver: ntfy-monitoring
              repeat_interval: 24h
        inhibit_rules:
          - source_matchers:
              - severity="critical"
            target_matchers:
              - severity=~"warning|info"
            equal: ["alertname", "namespace", "cluster"]
          - source_matchers:
              - alertname="KubeNodeNotReady"
            target_matchers:
              - alertname=~"KubePod.*|KubeDeployment.*|KubeStatefulSet.*"
            equal: ["node"]
        receivers:
          - name: ntfy-monitoring
            webhook_configs:
              - url: https://ntfy.f4mily.net/monitoring
                send_resolved: true
                http_config:
                  authorization:
                    type: Bearer
                    credentials_file: /etc/vm/secrets/alertmanager-ntfy-credentials/token
          - name: blackhole

    # ============================================
    # NODE EXPORTER
    # ============================================
    prometheus-node-exporter:
      enabled: true

    # ============================================
    # KUBE STATE METRICS
    # ============================================
    kube-state-metrics:
      enabled: true

    # ============================================
    # DEFAULT DASHBOARDS & RULES
    # ============================================
    defaultDashboards:
      enabled: true

    defaultRules:
      enabled: true
      # Homelab: reduce noise from control-plane rules that often do not scrape on K3s/Talos
      groups:
        etcd:
          create: false
        kubeScheduler:
          create: false
        kubeProxy:
          create: false
        kubernetesSystemControllerManager:
          create: false
        kubernetesSystemScheduler:
          create: false
        k8sContainerCpuLimits:
          create: false
        k8sContainerCpuRequests:
          create: false
        k8sContainerCpuUsageSecondsTotal:
          create: false
        k8sContainerMemoryLimits:
          create: false
        k8sContainerMemoryRequests:
          create: false
        k8sContainerMemoryRss:
          create: false
        k8sContainerMemoryCache:
          create: false
        k8sContainerMemoryWorkingSetBytes:
          create: false
        k8sContainerMemorySwap:
          create: false
        k8sPodOwner:
          create: false
        k8sContainerResource:
          create: false
      rule:
        spec:
          labels:
            cluster: homelab
      alerting:
        spec:
          labels:
            cluster: homelab

    # ============================================
    # GRAFANA
    # ============================================
    grafana:
      enabled: true

      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-username
        passwordKey: admin-password

      # Recreate avoids RWO PVC deadlock on upgrades
      deploymentStrategy:
        type: Recreate

      # Persistence - reuse existing PVC
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi

      # Security context
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

      # emptyDir volumes needed for readOnlyRootFilesystem + plugin installer
      extraVolumes:
        - name: tmp
          emptyDir: {}
        - name: plugins-dir
          emptyDir: {}

      extraVolumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: plugins-dir
          mountPath: /var/lib/grafana/plugins

      # Native VictoriaMetrics datasource plugin
      # Pin to 0.22.0 - 0.23.x requires Grafana >=11.6.11 (not yet available in charts)
      plugins:
        - victoriametrics-metrics-datasource@0.22.0

      priorityClassName: homelab-infrastructure

      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 512Mi

      # Give grafana time to download and install the VM plugin before health checks
      readinessProbe:
        initialDelaySeconds: 60
        timeoutSeconds: 5
        failureThreshold: 10
      livenessProbe:
        initialDelaySeconds: 120
        timeoutSeconds: 10
        failureThreshold: 10

      ingress:
        enabled: false

      # Generic OAuth via Authentik (login.f4mily.net, application slug: grafana)
      # Requires Secret grafana-authentik-oauth — create with: just grafana-authentik-oauth
      envValueFrom:
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
          secretKeyRef:
            name: grafana-authentik-oauth
            key: client-id
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-authentik-oauth
            key: client-secret
      grafana.ini:
        server:
          root_url: https://grafana.cluster.f4mily.net
        users:
          auto_assign_org: true
          auto_assign_org_role: Viewer
        auth:
          signout_redirect_url: https://login.f4mily.net/application/o/grafana/end-session/
        auth.generic_oauth:
          enabled: true
          name: Authentik
          scopes: openid profile email entitlements
          auth_url: https://login.f4mily.net/application/o/grafana/authorize/
          token_url: https://login.f4mily.net/application/o/grafana/token/
          api_url: https://login.f4mily.net/application/o/grafana/userinfo/
          allow_sign_up: true
          use_pkce: true
          role_attribute_path: >-
            contains(entitlements[*], 'Grafana Admins') && 'Admin' ||
            contains(entitlements[*], 'Grafana Editors') && 'Editor' ||
            'Viewer'
          allow_assign_grafana_admin: true

      podAnnotations:
        backup.velero.io/backup-volumes: grafana-storage

      # Sidecar watches for dashboard configmaps (chart handles datasource natively)
      sidecar:
        datasources:
          enabled: true
          initDatasources: false
          label: grafana_datasource
          labelValue: "1"
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"

    # ============================================
    # DATASOURCE - chart manages this natively
    # ============================================
    defaultDatasources:
      enabled: true
      victoriametrics:
        # Use native VM datasource plugin as default
        datasourceType: victoriametrics-metrics-datasource

    # ============================================
    # KUBELET SCRAPING
    # ============================================
    kubelet:
      enabled: true
      spec:
        interval: 30s

    # ============================================
    # KUBE API SERVER SCRAPING
    # ============================================
    kubeApiServer:
      enabled: true

    # ============================================
    # KUBE CONTROLLER MANAGER
    # ============================================
    kubeControllerManager:
      enabled: true

    # ============================================
    # KUBE SCHEDULER
    # ============================================
    kubeScheduler:
      enabled: true

    # ============================================
    # KUBE ETCD
    # ============================================
    kubeEtcd:
      enabled: true

    # ============================================
    # KUBE PROXY
    # ============================================
    kubeProxy:
      enabled: false
