# Critical workload alerts (OOM / CrashLoop) — labels for n8n Alert Triage + runbooks.
# Direct AM → /webhook/vmalert (GitOps PR) is disabled by default; see alerting-n8n-gitops-remediation.md.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: homelab-workload-remediation
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: homelab-monitoring
    homelab/owner: platform
spec:
  groups:
    - name: homelab.platform.workloads
      interval: 30s
      rules:
        - alert: KubePodOOMKilled
          # Fire only on a *recent* OOM (a restart in the last 15m). The
          # last_terminated_reason series stays "OOMKilled" until the pod is
          # recreated, so without the changes() guard a single one-off OOM
          # alerts forever and keeps re-notifying.
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            and on (namespace, pod, container)
            changes(kube_pod_container_status_restarts_total[15m]) > 0
          for: 1m
          labels:
            severity: critical
            cluster: homelab
            homelab_owner: platform
            homelab_auto_remediate: "true"
          annotations:
            summary: "OOMKilled: {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }})"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was terminated with OOMKilled. Consider memory limits/requests or workload scaling."
            runbook_url: "https://github.com/kreativmonkey/homelab-gitops/blob/main/gitops-homelab/docs/runbooks/pod-crash-remediation.md"

        - alert: KubePodCrashLoopBackOff
          expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
          for: 2m
          labels:
            severity: critical
            cluster: homelab
            homelab_owner: platform
            homelab_auto_remediate: "true"
          annotations:
            summary: "CrashLoopBackOff: {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }})"
            description: "Pod {{ $labels.pod }} container {{ $labels.container }} in {{ $labels.namespace }} is in CrashLoopBackOff. If this is an init container, pod restart does not help — fix GitOps manifest."
            runbook_url: "https://github.com/kreativmonkey/homelab-gitops/blob/main/gitops-homelab/docs/runbooks/nextcloud-init-crashloop.md"
