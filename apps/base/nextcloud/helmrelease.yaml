apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-nextcloud
spec:
  interval: 1h
  timeout: 20m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: nextcloud
      version: "9.1.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: username
      targetPath: externalDatabase.user
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: password
      targetPath: externalDatabase.password
    - kind: Secret
      name: nextcloud-admin
      valuesKey: username
      targetPath: nextcloud.username
    - kind: Secret
      name: nextcloud-admin
      valuesKey: password
      targetPath: nextcloud.password
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      # renovate: datasource=docker depName=docker.io/library/nextcloud
      tag: 33.0.3-apache
    ingress:
      enabled: false
    service:
      port: 80
    phpClientHttpsFix:
      enabled: true
      protocol: https
    internalDatabase:
      enabled: false
    mariadb:
      enabled: false
    postgresql:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: homelab-postgres-rw.cnpg-system.svc.cluster.local
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: homelab-postgres-nextcloud
        usernameKey: username
        passwordKey: password
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: 8.2.1-debian-12-r0
      master:
        persistence:
          enabled: false
    persistence:
      enabled: true
      existingClaim: nextcloud-data
      # Chart uses persistence.subPath for datadir only; nextcloud.persistence.subPath covers html/config.
      subPath: docker/nextcloud
    nextcloud:
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
      host: nextcloud.cluster.f4mily.net
      trustedDomains:
        - nextcloud.cluster.f4mily.net
      # Required so the chart mounts defaultConfigs (autoconfig.php reads POSTGRES_*).
      configs:
        cluster.config.php: |-
          <?php
          $CONFIG = array(
            'overwritehost' => 'nextcloud.cluster.f4mily.net',
            'overwriteprotocol' => 'https',
          );
      # Shared TrueNAS export: files are UID 1000 from Docker (PUID). Run non-root as 1000 so
      # rsync skips --chown (nextcloud/docker#1344) and writes match existing ownership.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      podSecurityContext:
        fsGroup: 1000
      # Non-root cannot create redis-session.ini in image-owned conf.d (nextcloud/helm#187).
      extraVolumes:
        - name: php-confd
          emptyDir: {}
      extraVolumeMounts:
        - name: php-confd
          mountPath: /usr/local/etc/php/conf.d/redis-session.ini
          subPath: redis-session.ini
      extraInitContainers:
        - name: create-redis-session-ini
          image: docker.io/library/busybox:1.36
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          command:
            - sh
            - -c
            - touch /mnt/redis-session.ini
          volumeMounts:
            - name: php-confd
              mountPath: /mnt
        # Existing NFS tree from Docker: avoid multi-hour rsync when code is already present.
        - name: bootstrap-skip-rsync
          image: docker.io/library/nextcloud:33.0.3-apache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          command:
            - /bin/sh
            - -ec
            - |
              if [ -f /var/www/html/index.php ] && [ -f /var/www/html/occ ] && [ ! -f /var/www/html/version.php ]; then
                cp -a /usr/src/nextcloud/version.php /var/www/html/version.php
                echo "bootstrap: placed version.php (skip entrypoint rsync on NFS)"
              fi
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: docker/nextcloud/html
        - name: occ-db-sync
          image: docker.io/library/nextcloud:33.0.3-apache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: POSTGRES_HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: POSTGRES_DB
              value: nextcloud
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-nextcloud
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-nextcloud
                  key: password
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin
                  key: username
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              cd /var/www/html
              if [ ! -f config/config.php ]; then
                if [ ! -f version.php ]; then
                  echo "occ-db-sync: no config.php and no version.php — skip (entrypoint will install)"
                  exit 0
                fi
                echo "occ-db-sync: running maintenance:install (missing config.php)"
                php occ maintenance:install -n \
                  --admin-user "${NEXTCLOUD_ADMIN_USER}" \
                  --admin-pass "${NEXTCLOUD_ADMIN_PASSWORD}" \
                  --data-dir /var/www/html/data \
                  --database pgsql \
                  --database-host "${POSTGRES_HOST}" \
                  --database-name "${POSTGRES_DB}" \
                  --database-user "${POSTGRES_USER}" \
                  --database-pass "${POSTGRES_PASSWORD}"
              fi
              php occ config:system:set dbtype --value=pgsql
              php occ config:system:set dbhost --value="${POSTGRES_HOST}"
              php occ config:system:set dbname --value="${POSTGRES_DB}"
              php occ config:system:set dbuser --value="${POSTGRES_USER}"
              php occ config:system:set dbpassword --value="${POSTGRES_PASSWORD}"
              php occ config:system:set redis host --value=nextcloud-redis-master
              php occ config:system:set redis port --value=6379
              php occ maintenance:mode --off || true
              php occ status
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: docker/nextcloud/html
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: docker/nextcloud/config
            - name: nextcloud-main
              mountPath: /var/www/html/data
              subPath: docker/nextcloud/data
            - name: nextcloud-main
              mountPath: /var/www/custom_apps
              subPath: docker/nextcloud/custom_apps
      extraEnv:
        - name: TZ
          value: Europe/Berlin
      persistence:
        subPath: docker/nextcloud
      strategy:
        type: Recreate
    startupProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 180
    livenessProbe:
      initialDelaySeconds: 60
      failureThreshold: 6
    readinessProbe:
      initialDelaySeconds: 30
      failureThreshold: 30
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 2Gi
    cronjob:
      enabled: true
      # crond sidecar requires root; use CronJob with same UID as the app pod.
      type: cronjob
      cronjob:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
