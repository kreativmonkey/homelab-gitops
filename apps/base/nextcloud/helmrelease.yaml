apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-nextcloud
spec:
  interval: 1h
  timeout: 20m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: nextcloud
      version: "9.1.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: username
      targetPath: externalDatabase.user
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: password
      targetPath: externalDatabase.password
    - kind: Secret
      name: nextcloud-admin
      valuesKey: username
      targetPath: nextcloud.username
    - kind: Secret
      name: nextcloud-admin
      valuesKey: password
      targetPath: nextcloud.password
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      # renovate: datasource=docker depName=docker.io/library/nextcloud
      tag: 33.0.3-apache
    ingress:
      enabled: false
    service:
      port: 80
    phpClientHttpsFix:
      enabled: true
      protocol: https
    internalDatabase:
      enabled: false
    mariadb:
      enabled: false
    postgresql:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: homelab-postgres-rw.cnpg-system.svc.cluster.local
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: homelab-postgres-nextcloud
        usernameKey: username
        passwordKey: password
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: 8.2.1-debian-12-r0
      master:
        persistence:
          enabled: false
    persistence:
      enabled: true
      existingClaim: nextcloud-data
      # Chart uses persistence.subPath for datadir only; nextcloud.persistence.subPath covers html/config.
      subPath: docker/nextcloud
    nextcloud:
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
      host: nextcloud.cluster.f4mily.net
      trustedDomains:
        - nextcloud.cluster.f4mily.net
      # Required so the chart mounts defaultConfigs (autoconfig.php reads POSTGRES_*).
      configs:
        cluster.config.php: |-
          <?php
          $CONFIG = array(
            'overwritehost' => 'nextcloud.cluster.f4mily.net',
            'overwriteprotocol' => 'https',
          );
      extraInitContainers:
        - name: data-perms
          image: docker.io/library/nextcloud:33.0.3-apache
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -ec
            - chown -R 33:33 /var/www/html /var/www/html/data /var/www/html/config /var/www/custom_apps || true
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: docker/nextcloud/html
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: docker/nextcloud/config
            - name: nextcloud-main
              mountPath: /var/www/html/data
              subPath: docker/nextcloud/data
            - name: nextcloud-main
              mountPath: /var/www/custom_apps
              subPath: docker/nextcloud/custom_apps
        - name: occ-db-sync
          image: docker.io/library/nextcloud:33.0.3-apache
          securityContext:
            runAsUser: 33
            runAsGroup: 33
          env:
            - name: POSTGRES_HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: POSTGRES_DB
              value: nextcloud
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-nextcloud
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-nextcloud
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              cd /var/www/html
              if [ ! -f config/config.php ]; then exit 0; fi
              php occ config:system:set dbtype --value=pgsql
              php occ config:system:set dbhost --value="${POSTGRES_HOST}"
              php occ config:system:set dbname --value="${POSTGRES_DB}"
              php occ config:system:set dbuser --value="${POSTGRES_USER}"
              php occ config:system:set dbpassword --value="${POSTGRES_PASSWORD}"
              php occ config:system:set redis host --value=nextcloud-redis-master
              php occ config:system:set redis port --value=6379
              php occ maintenance:mode --off || true
              php occ status
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: docker/nextcloud/html
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: docker/nextcloud/config
            - name: nextcloud-main
              mountPath: /var/www/html/data
              subPath: docker/nextcloud/data
            - name: nextcloud-main
              mountPath: /var/www/custom_apps
              subPath: docker/nextcloud/custom_apps
      extraEnv:
        - name: TZ
          value: Europe/Berlin
      persistence:
        subPath: docker/nextcloud
      strategy:
        type: Recreate
    startupProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 180
    livenessProbe:
      initialDelaySeconds: 60
      failureThreshold: 6
    readinessProbe:
      initialDelaySeconds: 30
      failureThreshold: 30
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 4Gi
    podSecurityContext:
      fsGroup: 33
    cronjob:
      enabled: true
