apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-nextcloud
spec:
  interval: 1h
  timeout: 20m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: nextcloud
      version: "9.1.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: username
      targetPath: externalDatabase.user
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: password
      targetPath: externalDatabase.password
    - kind: Secret
      name: nextcloud-admin
      valuesKey: username
      targetPath: nextcloud.username
    - kind: Secret
      name: nextcloud-admin
      valuesKey: password
      targetPath: nextcloud.password
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      tag: 33.0.3-apache
    ingress:
      enabled: false
    service:
      port: 80
    phpClientHttpsFix:
      enabled: true
      protocol: https
    internalDatabase:
      enabled: false
    mariadb:
      enabled: false
    postgresql:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: homelab-postgres-rw.cnpg-system.svc.cluster.local
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: homelab-postgres-nextcloud
        usernameKey: username
        passwordKey: password
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: 8.2.1-debian-12-r0
      master:
        persistence:
          enabled: false
    persistence:
      enabled: true
      existingClaim: nextcloud-data
    nextcloud:
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
      host: nextcloud.cluster.f4mily.net
      trustedDomains:
        - nextcloud.cluster.f4mily.net
      # Required so the chart mounts defaultConfigs (autoconfig.php reads POSTGRES_*).
      configs:
        cluster.config.php: |-
          <?php
          $CONFIG = array(
            'overwritehost' => 'nextcloud.cluster.f4mily.net',
            'overwriteprotocol' => 'https',
          );
      extraEnv:
        - name: TZ
          value: Europe/Berlin
      persistence:
        subPath: docker/nextcloud
      strategy:
        type: Recreate
    startupProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 180
    livenessProbe:
      initialDelaySeconds: 60
      failureThreshold: 6
    readinessProbe:
      initialDelaySeconds: 30
      failureThreshold: 30
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 4Gi
    podSecurityContext:
      fsGroup: 33
    cronjob:
      enabled: true
