apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-nextcloud
spec:
  interval: 1h
  timeout: 20m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: nextcloud
      version: "9.1.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud-repo
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: username
      targetPath: externalDatabase.user
    - kind: Secret
      name: homelab-postgres-nextcloud
      valuesKey: password
      targetPath: externalDatabase.password
    - kind: Secret
      name: nextcloud-admin
      valuesKey: username
      targetPath: nextcloud.username
    - kind: Secret
      name: nextcloud-admin
      valuesKey: password
      targetPath: nextcloud.password
  values:
    global:
      security:
        allowInsecureImages: true
    # PVC has data from 33.0.4.1 — must match to avoid downgrade error.
    # renovate: datasource=docker depName=docker.io/library/nextcloud
    image:
      tag: 33.0.4
    ingress:
      enabled: false
    service:
      port: 80
    phpClientHttpsFix:
      enabled: true
      protocol: https
    internalDatabase:
      enabled: false
    mariadb:
      enabled: false
    postgresql:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: homelab-postgres-rw.cnpg-system.svc.cluster.local
      database: nextcloud
      existingSecret:
        enabled: true
        secretName: homelab-postgres-nextcloud
        usernameKey: username
        passwordKey: password
    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
        tag: 8.2.1-debian-12-r0
      master:
        persistence:
          enabled: false
    persistence:
      enabled: true
      existingClaim: nextcloud-app-iscsi
      # Separate NFS PVC for data directory (mounted at /var/www/html/data).
      # Chart creates a dedicated nextcloud-data volume — no extraVolume needed.
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data
        subPath: docker/nextcloud
    nextcloud:
      persistence:
        # Empty subPath → chart uses "html", "config", etc. directly on iSCSI PVC.
        subPath: ""
      existingSecret:
        enabled: true
        secretName: nextcloud-admin
        usernameKey: username
        passwordKey: password
      host: nc.f4mily.net
      trustedDomains:
        - nc.f4mily.net
      # S3 (Garage) as primary object store — new uploads go directly to S3.
      objectStore:
        s3:
          enabled: true
          bucket: nextcloud
          host: 192.168.10.94
          port: "30188"
          region: garage
          usePathStyle: true
          ssl: false
          legacyAuth: false
          existingSecret: nextcloud-s3-credentials
          secretKeys:
            accessKey: access-key
            secretKey: secret-key
      # PHP ini overrides for large file uploads and long-running requests.
      phpConfigs:
        zz-large-uploads.ini: |-
          max_execution_time = 0
          upload_max_filesize = 16G
          post_max_size = 16G
          memory_limit = 512M
      # Required so the chart mounts defaultConfigs (autoconfig.php reads POSTGRES_*).
      configs:
        cluster.config.php: |-
          <?php
          $CONFIG = array(
            'overwritehost' => 'nc.f4mily.net',
            'overwriteprotocol' => 'https',
            'overwrite.cli.url' => 'https://nc.f4mily.net',
            'allow_local_remote_servers' => true,
            'trusted_proxies' => array('127.0.0.1', '10.0.0.0/8'),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR', 'HTTP_X_REAL_IP'),
            'maintenance_window_start' => 2,
            'default_phone_region' => 'DE',
            'serverid' => 1,
          );
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      podSecurityContext:
        fsGroup: 1000
      # php-confd emptyDir for Redis session config (non-root cannot write to conf.d).
      extraVolumes:
        - name: php-confd
          emptyDir: {}
      extraVolumeMounts:
        # Non-root cannot create redis-session.ini in image-owned conf.d (nextcloud/helm#187).
        - name: php-confd
          mountPath: /usr/local/etc/php/conf.d/redis-session.ini
          subPath: redis-session.ini
      extraInitContainers:
        # 1) Migrate config + app code from old NFS to new iSCSI PVC (one-shot).
        # Chart mounts nextcloud-main with subPath "html", "config", etc.
        # This init container mounts nextcloud-main at root (no subPath) to populate
        # the correct subdirectory structure: html/, config/, custom_apps/, etc.
        - name: migrate-from-nfs
          image: docker.io/library/nextcloud:33.0.4-apache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              if [ -f /var/www/html/html/version.php ] && [ -f /var/www/html/config/config.php ]; then
                echo "migrate-from-nfs: data already present on iSCSI PVC, skipping"
                exit 0
              fi
              echo "migrate-from-nfs: copying data from old NFS to iSCSI PVC..."
              mkdir -p /var/www/html/html /var/www/html/config \
                       /var/www/html/custom_apps /var/www/html/themes \
                       /var/www/html/tmp /var/www/html/root
              [ -d /mnt/old-nfs/html ] && cp -a /mnt/old-nfs/html/. /var/www/html/html/
              [ -d /mnt/old-nfs/config ] && cp -a /mnt/old-nfs/config/. /var/www/html/config/
              [ -d /mnt/old-nfs/custom_apps ] && cp -a /mnt/old-nfs/custom_apps/. /var/www/html/custom_apps/
              [ -d /mnt/old-nfs/themes ] && cp -a /mnt/old-nfs/themes/. /var/www/html/themes/
              [ -d /mnt/old-nfs/tmp ] && cp -a /mnt/old-nfs/tmp/. /var/www/html/tmp/
              echo "migrate-from-nfs: migration complete"
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
            - name: nextcloud-data
              mountPath: /mnt/old-nfs
              subPath: docker/nextcloud
        # 2) Create Redis session config file (emptyDir).
        - name: create-redis-session-ini
          image: docker.io/library/busybox:1.38
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          command:
            - sh
            - -c
            - touch /mnt/redis-session.ini
          volumeMounts:
            - name: php-confd
              mountPath: /mnt
        # 3) Ensure database configuration is set.
        # renovate: datasource=docker depName=docker.io/library/nextcloud
        - name: occ-db-sync
          image: docker.io/library/nextcloud:33.0.4-apache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: POSTGRES_HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: POSTGRES_DB
              value: nextcloud
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-nextcloud
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-nextcloud
                  key: password
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin
                  key: username
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin
                  key: password
            - name: NEXTCLOUD_PUBLIC_HOST
              value: nc.f4mily.net
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              cd /var/www/html
              if [ ! -f config/config.php ]; then
                if [ ! -f version.php ]; then
                  echo "occ-db-sync: no config.php and no version.php — skip (entrypoint will install)"
                  exit 0
                fi
                echo "occ-db-sync: running maintenance:install (missing config.php)"
                php occ maintenance:install -n \
                  --admin-user "${NEXTCLOUD_ADMIN_USER}" \
                  --admin-pass "${NEXTCLOUD_ADMIN_PASSWORD}" \
                  --data-dir /var/www/html/data \
                  --database pgsql \
                  --database-host "${POSTGRES_HOST}" \
                  --database-name "${POSTGRES_DB}" \
                  --database-user "${POSTGRES_USER}" \
                  --database-pass "${POSTGRES_PASSWORD}"
              fi
              php occ config:system:set dbtype --value=pgsql
              php occ config:system:set dbhost --value="${POSTGRES_HOST}"
              php occ config:system:set dbname --value="${POSTGRES_DB}"
              php occ config:system:set dbuser --value="${POSTGRES_USER}"
              php occ config:system:set dbpassword --value="${POSTGRES_PASSWORD}"
              php occ config:system:set redis host --value=nextcloud-redis-master
              php occ config:system:set redis port --value=6379
              php occ config:system:set overwritehost --value="${NEXTCLOUD_PUBLIC_HOST}"
              php occ config:system:set overwriteprotocol --value=https
              php occ config:system:set overwrite.cli.url --value="https://${NEXTCLOUD_PUBLIC_HOST}"
              php occ config:system:set trusted_domains 0 --value="${NEXTCLOUD_PUBLIC_HOST}"
              php occ config:system:set trusted_proxies 0 --value="127.0.0.1"
              php occ config:system:set trusted_proxies 1 --value="10.0.0.0/8"
              php occ config:system:set forwarded_for_headers 0 --value="HTTP_X_FORWARDED_FOR"
              php occ config:system:set forwarded_for_headers 1 --value="HTTP_X_REAL_IP"
              php occ config:system:set maintenance_window_start --value=2 --type=integer
              php occ config:system:set default_phone_region --value=DE
              php occ config:system:set serverid --value=1 --type=integer
              # integrity cleanup leftover from NFS dot-prefixed temp files
              find /var/www/html/dist /var/www/html/core/dist -maxdepth 1 -type f -name '.*.*' -delete 2>/dev/null || true
              find /var/www/html/apps -path '*/img/*' -type f -name '.*.*' -delete 2>/dev/null || true
              php occ maintenance:update:htaccess --no-interaction
              MARKER=/var/www/html/data/.occ-mime-repair-done
              if [ ! -f "${MARKER}" ]; then
                echo "occ-db-sync: running one-time MIME type repair (expensive)"
                php occ maintenance:repair --include-expensive --no-interaction && touch "${MARKER}"
              fi
              php occ maintenance:mode --off || true
              php occ status
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: html
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: config
            - name: nextcloud-data
              mountPath: /var/www/html/data
              subPath: docker/nextcloud/data
        # 4) Configure Authentik OIDC provider.
        # renovate: datasource=docker depName=docker.io/library/nextcloud
        - name: occ-oidc-setup
          image: docker.io/library/nextcloud:33.0.4-apache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: nextcloud-authentik-oauth
                  key: client-id
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextcloud-authentik-oauth
                  key: client-secret
                  optional: true
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              cd /var/www/html
              test -f config/config.php || exit 0
              php occ app:install user_oidc 2>/dev/null || true
              php occ app:enable user_oidc
              php occ config:system:set allow_local_remote_servers --value=true --type=boolean
              if [ -z "${OIDC_CLIENT_ID:-}" ] || [ -z "${OIDC_CLIENT_SECRET:-}" ]; then
                echo "occ-oidc-setup: skip provider (secret nextcloud-authentik-oauth missing — run just nextcloud-authentik-oauth)"
                exit 0
              fi
              php occ user_oidc:provider authentik \
                --clientid="${OIDC_CLIENT_ID}" \
                --clientsecret="${OIDC_CLIENT_SECRET}" \
                --discoveryuri="https://login.f4mily.net/application/o/nextcloud/.well-known/openid-configuration" \
                --scope="openid profile email groups" \
                --mapping-uid=sub \
                --mapping-display-name=name \
                --mapping-email=email \
                --mapping-groups=groups \
                --group-provisioning=1 \
                --unique-uid=0
              php occ config:app:set --value=0 user_oidc allow_multiple_user_backends
              php occ config:app:set user_oidc login_button_text --value="Authentik"
              echo "occ-oidc-setup: Authentik provider configured"
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: html
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: config
            - name: nextcloud-data
              mountPath: /var/www/html/data
              subPath: docker/nextcloud/data
        # 5) Configure Whiteboard + AppAPI HaRP.
        # renovate: datasource=docker depName=docker.io/library/nextcloud
        - name: occ-collab-setup
          image: docker.io/library/nextcloud:33.0.4-apache
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: NEXTCLOUD_PUBLIC_HOST
              value: nc.f4mily.net
            - name: NEXTCLOUD_PUBLIC_URL
              value: https://nc.f4mily.net
            - name: WHITEBOARD_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextcloud-collab
                  key: whiteboard-jwt-secret
                  optional: true
            - name: HARP_SHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: nextcloud-collab
                  key: harp-shared-key
                  optional: true
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              cd /var/www/html
              test -f config/config.php || exit 0
              if [ -z "${WHITEBOARD_JWT_SECRET:-}" ] || [ -z "${HARP_SHARED_KEY:-}" ]; then
                echo "occ-collab-setup: skip (secret nextcloud-collab missing — run just nextcloud-collab-secrets)"
                exit 0
              fi
              php occ app:install whiteboard 2>/dev/null || true
              php occ app:enable whiteboard
              php occ config:app:set whiteboard collabBackendUrl --value="${NEXTCLOUD_PUBLIC_URL}"
              php occ config:app:set whiteboard jwt_secret_key --value="${WHITEBOARD_JWT_SECRET}"
              php occ app:install app_api 2>/dev/null || true
              php occ app:enable app_api
              echo "occ-collab-setup: checking AppAPI HaRP (non-blocking)..."
              for i in $(seq 1 12); do
                if curl -fsS "http://appapi-harp:8780/exapps/app_api/info" \
                    -H "harp-shared-key: ${HARP_SHARED_KEY}" 2>/dev/null \
                    | grep -q '"kubernetes"'; then
                  echo "occ-collab-setup: HaRP K8s backend ready"
                  if ! php occ app_api:daemon:list 2>/dev/null | grep -q 'k8s_homelab'; then
                    if php occ help app_api:daemon:register 2>&1 | grep -q '\-\-k8s'; then
                      php occ app_api:daemon:register k8s_homelab "K8s Homelab" "kubernetes-install" "http" \
                        "appapi-harp:8780" "${NEXTCLOUD_PUBLIC_URL}" \
                        --harp --harp_shared_key "${HARP_SHARED_KEY}" \
                        --harp_frp_address "appapi-harp:8782" \
                        --k8s --k8s_expose_type=clusterip --set-default \
                        || echo "occ-collab-setup: daemon register failed (non-fatal)"
                      echo "occ-collab-setup: registered AppAPI K8s deploy daemon"
                    else
                      echo "occ-collab-setup: app_api lacks --k8s (bundled 33.x); HaRP running, manual daemon register later"
                    fi
                  else
                    echo "occ-collab-setup: AppAPI daemon k8s_homelab already registered"
                  fi
                  exit 0
                fi
                sleep 5
              done
              echo "occ-collab-setup: HaRP not ready yet — whiteboard configured; daemon register on next restart"
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: html
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: config
            - name: nextcloud-data
              mountPath: /var/www/html/data
              subPath: docker/nextcloud/data
      extraEnv:
        - name: TZ
          value: Europe/Berlin
      strategy:
        type: Recreate
    startupProbe:
      enabled: true
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 180
    livenessProbe:
      initialDelaySeconds: 60
      failureThreshold: 6
    readinessProbe:
      initialDelaySeconds: 30
      failureThreshold: 30
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 2Gi
    cronjob:
      enabled: true
      # crond sidecar requires root; use CronJob with same UID as the app pod.
      type: cronjob
      cronjob:
        # Chart default failedJobsHistoryLimit=5 → five parallel KubeJobFailed alerts.
        failedJobsHistoryLimit: 1
        successfulJobsHistoryLimit: 2
        activeDeadlineSeconds: 1800
        backoffLimit: 2
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
        command:
          - php
          - -d
          - memory_limit=512M
          - -f
          - /var/www/html/cron.php
          - --
          - --verbose
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
