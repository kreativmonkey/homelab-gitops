apiVersion: apps/v1
kind: Deployment
metadata:
  name: appapi-harp
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: appapi-harp
    app.kubernetes.io/part-of: nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: appapi-harp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appapi-harp
    spec:
      serviceAccountName: appapi-harp
      enableServiceLinks: false
      containers:
        - name: appapi-harp
          # renovate: datasource=docker depName=ghcr.io/nextcloud/nextcloud-appapi-harp
          image: ghcr.io/nextcloud/nextcloud-appapi-harp:v0.4.2
          ports:
            - name: exapps
              containerPort: 8780
            - name: frp
              containerPort: 8782
          env:
            - name: HP_SHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: nextcloud-collab
                  key: harp-shared-key
            - name: NC_INSTANCE_URL
              value: https://nc.f4mily.net
            - name: HP_FRP_ADDRESS
              value: 0.0.0.0:8782
            - name: HP_EXAPPS_ADDRESS
              value: 0.0.0.0:8780
            - name: HP_TRUSTED_PROXY_IPS
              value: 10.0.0.0/8,127.0.0.1
            - name: HP_K8S_ENABLED
              value: "true"
            - name: HP_K8S_NAMESPACE
              value: nextcloud-exapps
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: exapps
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: exapps
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: appapi-harp
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: appapi-harp
    app.kubernetes.io/part-of: nextcloud
spec:
  selector:
    app.kubernetes.io/name: appapi-harp
  ports:
    - name: exapps
      port: 8780
      targetPort: exapps
    - name: frp
      port: 8782
      targetPort: frp
