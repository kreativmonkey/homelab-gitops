apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Nextcloud
    gethomepage.dev/app: nextcloud
    gethomepage.dev/description: File sharing
    gethomepage.dev/group: Office
    gethomepage.dev/icon: nextcloud.png
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nextcloud.cluster.f4mily.net
      secretName: wildcard-cluster-f4mily-net-tls
  rules:
    - host: nextcloud.cluster.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
