apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Nextcloud
    gethomepage.dev/app: nextcloud
    gethomepage.dev/description: File sharing
    gethomepage.dev/group: Office
    gethomepage.dev/icon: nextcloud.png
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    nginx.org/proxy-body-size: "0"
    nginx.org/hsts: "true"
    nginx.org/hsts-max-age: "15552000"
    nginx.org/hsts-include-subdomains: "true"
    # Whiteboard /socket.io/ + ExApps via HaRP (/exapps/)
    nginx.org/websocket-services: "nextcloud-whiteboard,appapi-harp"
    nginx.org/proxy-read-timeout: "3600s"
    nginx.org/proxy-send-timeout: "3600s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nc.f4mily.net
      secretName: wildcard-f4mily-net-tls
  rules:
    - host: nc.f4mily.net
      http:
        paths:
          # Root first — Homepage v1.13.1 ingress discovery picks first path as URL.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: nextcloud-whiteboard
                port:
                  number: 3002
          - path: /exapps
            pathType: Prefix
            backend:
              service:
                name: appapi-harp
                port:
                  number: 8780
