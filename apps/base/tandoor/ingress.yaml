apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tandoor
  namespace: tandoor
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Tandoor
    gethomepage.dev/description: Recipes
    gethomepage.dev/group: Medien
    gethomepage.dev/icon: tandoor-recipes.png
    gethomepage.dev/app: tandoor
    gethomepage.dev/pod-selector: app=tandoor
    nginx.org/ssl-redirect: "false"
    nginx.org/redirect-to-https: "true"
    # Match Tandoor internal client_max_body_size (512M in Recipes.conf)
    nginx.org/client-max-body-size: "512M"
    nginx.org/proxy-read-timeout: "300s"
    nginx.org/proxy-send-timeout: "300s"
    # ── CSRF-Root-Cause (recurring) ──────────────────────────────────────────
    # Tandoor container nginx handles request to gunicorn via Unix socket.
    # Its nginx-template (http.d/Recipes.conf.template) sets only Host &
    # X-Forwarded-For, NOT X-Forwarded-Proto.  While nginx normally passes
    # unset headers through, this is NOT guaranteed when proxy_set_header
    # exists in the location block — the header CAN be dropped depending on
    # nginx version, Alpine update, or container restart.
    #
    # Solution: Explicitly set X-Forwarded-Proto at the ingress-controller
    # layer so the header ALWAYS reaches gunicorn.  Django then honours
    # its hardcoded SECURE_PROXY_SSL_HEADER and request.is_secure() is
    # correctly True.
    #
    # Do NOT replace with nginx.org/proxy-set-headers (caused 502 in PR#184).
    # Do NOT add nginx.org/server-snippets with `if` (caused 404 in same PR).
    nginx.org/location-snippets: |
      proxy_set_header X-Forwarded-Proto $scheme;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rezepte.f4mily.net
      secretName: wildcard-f4mily-net-tls
  rules:
    - host: rezepte.f4mily.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tandoor
                port:
                  number: 80
