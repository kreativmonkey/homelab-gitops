apiVersion: apps/v1
kind: Deployment
metadata:
  name: tandoor
  namespace: tandoor
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: postgresql.cnpg.io/Database/cnpg-system/homelab-postgres-tandoor
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tandoor
  template:
    metadata:
      labels:
        app: tandoor
        app.kubernetes.io/name: tandoor
    spec:
      securityContext:
        fsGroup: 0
      containers:
        - name: tandoor
          image: docker.io/vabene1111/recipes:2.6.12
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # boot.sh nginx template: listen ${TANDOOR_PORT} (default 80 binds wrong on k8s)
            - name: TANDOOR_PORT
              value: "8080"
            - name: TZ
              value: Europe/Berlin
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tandoor-app
                  key: SECRET_KEY
            - name: DB_ENGINE
              value: django.db.backends.postgresql
            - name: POSTGRES_HOST
              value: homelab-postgres-rw.cnpg-system.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: tandoor
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-tandoor
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-postgres-tandoor
                  key: password
            - name: ALLOWED_HOSTS
              value: rezepte.f4mily.net,recipes.f4mily.net,localhost,127.0.0.1
            # Django 4+ origin check when TLS terminates at ingress (see docs.tandoor.dev)
            - name: CSRF_TRUSTED_ORIGINS
              value: https://rezepte.f4mily.net,https://recipes.f4mily.net
            # Built-in container nginx + cluster ingress nginx
            - name: ALLAUTH_TRUSTED_PROXY_COUNT
              value: "2"
            - name: EMAIL_HOST
              value: mail.f4mily.net
            - name: EMAIL_PORT
              value: "465"
            - name: EMAIL_USE_TLS
              value: "1"
            - name: EMAIL_USE_SSL
              value: "0"
            - name: DEFAULT_FROM_EMAIL
              value: tandoor@f4mily.net
            - name: EMAIL_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: tandoor-app
                  key: EMAIL_HOST_USER
                  optional: true
            - name: EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tandoor-app
                  key: EMAIL_HOST_PASSWORD
                  optional: true
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tandoor-app
                  key: AI_API_KEY
                  optional: true
            - name: AI_MODEL_NAME
              value: openai/gpt-4o
            - name: AI_RATELIMIT
              value: 60/hour
            - name: SOCIAL_PROVIDERS
              value: allauth.socialaccount.providers.openid_connect
            - name: SOCIALACCOUNT_PROVIDERS
              valueFrom:
                secretKeyRef:
                  name: tandoor-app
                  key: SOCIALACCOUNT_PROVIDERS
          volumeMounts:
            - name: static
              mountPath: /opt/recipes/staticfiles
              subPath: docker/tandoor/staticfiles
            - name: media
              mountPath: /opt/recipes/mediafiles
              subPath: docker/tandoor/mediafiles
          startupProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: rezepte.f4mily.net
            initialDelaySeconds: 180
            failureThreshold: 90
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: rezepte.f4mily.net
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: rezepte.f4mily.net
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 768Mi
            limits:
              memory: 1536Mi
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            capabilities:
              add: ["CHOWN", "DAC_OVERRIDE", "SETGID", "SETUID"]
              drop: ["ALL"]
          # ── CSRF-Permanent-Fix ──────────────────────────────────────────────────
          # Tandoor container nginx v2.6.9 template (`Recipes.conf.template`) does
          # NOT set `proxy_set_header X-Forwarded-Proto`.  While default nginx
          # behaviour passes the header through, NGINX Ingress Controller versions
          # (especially after the v5.5.0 proxy-set-headers refactor) may omit it.
          # Without `X-Forwarded-Proto: https`, Django's SECURE_PROXY_SSL_HEADER
          # never matches → request.is_secure() = False → CSRF 403.
          #
          # This postStart hook injects the header unconditionally so it always
          # reaches gunicorn regardless of IC version or config changes.
          #
          # Do NOT remove or convert to initContainer.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    while [ ! -f /etc/nginx/http.d/Recipes.conf ]; do sleep 1; done
                    if ! grep -q 'X-Forwarded-Proto.*https' /etc/nginx/http.d/Recipes.conf; then
                      sed -i '/proxy_set_header Host/a\    proxy_set_header X-Forwarded-Proto "https";' /etc/nginx/http.d/Recipes.conf
                    fi
                    nginx -s reload 2>/dev/null || true
      volumes:
        - name: static
          persistentVolumeClaim:
            claimName: tandoor-static
        - name: media
          persistentVolumeClaim:
            claimName: tandoor-media
---
apiVersion: v1
kind: Service
metadata:
  name: tandoor
  namespace: tandoor
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: tandoor
