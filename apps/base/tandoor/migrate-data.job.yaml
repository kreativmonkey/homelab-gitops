# One-shot Job: populate NFS subPaths docker/tandoor/{staticfiles,mediafiles}.
# Not included in kustomization — apply manually during migration.
#
#   kubectl scale deployment/tandoor -n tandoor --replicas=0
#   kubectl apply -f apps/base/tandoor/migrate-data.job.yaml
#   POD=$(kubectl get pod -n tandoor -l job-name=tandoor-data-migrate -o jsonpath='{.items[0].metadata.name}')
#   tar -C /path/to/Migration/tandoor -czf /tmp/tandoor-files.tar.gz staticfiles mediafiles
#   kubectl cp /tmp/tandoor-files.tar.gz tandoor/$POD:/tmp/tandoor-files.tar.gz
#   kubectl exec -n tandoor $POD -- sh -c 'tar -xzf /tmp/tandoor-files.tar.gz -C /mnt'
#   kubectl delete job -n tandoor tandoor-data-migrate
apiVersion: batch/v1
kind: Job
metadata:
  name: tandoor-data-migrate
  namespace: tandoor
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.37
          command: ["sleep", "3600"]
          volumeMounts:
            - name: static
              mountPath: /mnt/static
              subPath: docker/tandoor/staticfiles
            - name: media
              mountPath: /mnt/media
              subPath: docker/tandoor/mediafiles
      volumes:
        - name: static
          persistentVolumeClaim:
            claimName: tandoor-static
        - name: media
          persistentVolumeClaim:
            claimName: tandoor-media
