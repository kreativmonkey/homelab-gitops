apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stirling-pdf-repo
  namespace: flux-system
spec:
  interval: 24h
  url: https://stirling-tools.github.io/Stirling-PDF-chart
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sterling-pdf
  namespace: sterling-pdf
spec:
  interval: 1h
  targetNamespace: sterling-pdf
  chart:
    spec:
      chart: stirling-pdf-chart
      version: "3.1.0"
      sourceRef:
        kind: HelmRepository
        name: stirling-pdf-repo
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      repository: stirlingtools/stirling-pdf
      tag: "2.7.2"
    envs:
      - name: DOCKER_ENABLE_SECURITY
        value: "false"
    service:
      type: ClusterIP
      externalPort: 8080
    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 8Gi
      path: /configs
    securityContext:
      enabled: true
      fsGroup: 1000
    livenessProbe:
      initialDelaySeconds: 120
      periodSeconds: 20
      timeoutSeconds: 10
      failureThreshold: 6
    readinessProbe:
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5
    startupProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - name: sterling-pdf.f4mily.net
          path: /
          tls: true
      tls:
        - secretName: sterling-pdf-tls
          hosts:
            - sterling-pdf.f4mily.net
