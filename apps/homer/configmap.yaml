apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
data:
  config.yml: |
    ---
    title: "Homelab Dashboard"
    subtitle: "K8s on Talos"
    logo: "logo.png"

    header: true
    footer: false

    columns: "auto"
    connectivityCheck: true

    theme: default
    colors:
      light:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#f5f5f5"
        card-background: "#ffffff"
        text: "#363636"
        text-header: "#ffffff"
        text-title: "#303030"
        text-subtitle: "#424242"
        card-shadow: rgba(0, 0, 0, 0.1)
        link: "#3273dc"
        link-hover: "#363636"
      dark:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#131313"
        card-background: "#2b2b2b"
        text: "#eaeaea"
        text-header: "#ffffff"
        text-title: "#fafafa"
        text-subtitle: "#f5f5f5"
        card-shadow: rgba(0, 0, 0, 0.4)
        link: "#3273dc"
        link-hover: "#ffdd57"

    services:
      - name: "Werkzeuge"
        icon: "fas fa-tools"
        items:
          - name: "Sterling PDF"
            logo: "https://cdn-icons-png.flaticon.com/512/33/33736.png"
            subtitle: "PDF Werkzeuge"
            tag: "pdf"
            url: "https://sterling-pdf.f4mily.net"
      - name: "Infrastructure"
        icon: "fas fa-server"
        items:
          - name: "Kite"
            logo: "https://raw.githubusercontent.com/kite-org/kite/main/docs/logo.svg"
            subtitle: "Kubernetes Dashboard"
            tag: "k8s"
            url: "https://kite.f4mily.net"
          - name: "Longhorn"
            logo: "https://longhorn.io/img/logos/longhorn-icon-color.png"
            subtitle: "Distributed storage"
            tag: "storage"
            url: "http://longhorn.homelab.local"
          - name: "Traefik"
            subtitle: "Ingress controller"
            tag: "proxy"
            url: "http://traefik.homelab.local"
