apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kite-repo
  namespace: flux-system
spec:
  interval: 24h
  url: https://kite-org.github.io/kite/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kite
  namespace: kite
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: cert-manager.io/Certificate/cert-manager/wildcard-f4mily-net
spec:
  interval: 1h
  targetNamespace: kite
  chart:
    spec:
      chart: kite
      version: "0.8.1"
      sourceRef:
        kind: HelmRepository
        name: kite-repo
        namespace: flux-system
  values:
    replicaCount: 1
    # Recreate strategy required for RWO volumes
    strategy:
      type: Recreate
    image:
      repository: ghcr.io/kite-org/kite
      tag: "v0.8.1"
    service:
      port: 8080
    host: https://kite.f4mily.net
    
    # Pre-install hook to wait for ingress-nginx webhook to be ready
    # Prevents race condition where TLS cert is not yet generated
    extraObjects:
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: "kite-webhook-wait"
          annotations:
            "helm.sh/hook": pre-install,pre-upgrade
            "helm.sh/hook-weight": "-5"
            "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
        spec:
          template:
            spec:
              restartPolicy: Never
              containers:
                - name: wait
                  image: busybox:latest
                  command:
                    - /bin/sh
                    - -c
                    - |
                      echo "Waiting 30s for ingress-nginx webhook TLS to be ready..."
                      sleep 30
                      echo "Continuing with installation"
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        cert-manager.io/uses-release-name: "true"
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - host: kite.f4mily.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: wildcard-f4mily-net-tls
          hosts:
            - kite.f4mily.net
    db:
      type: sqlite
      sqlite:
        persistence:
          pvc:
            enabled: true
            storageClass: longhorn
            accessModes:
              - ReadWriteOnce
            size: 1Gi
    # Relaxed probes to prevent premature restarts
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 4
