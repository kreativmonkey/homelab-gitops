apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ============================================================================
# APP CATALOG (enable / disable applications)
# ----------------------------------------------------------------------------
# Each line below references an app's Kustomize base in apps/base/<app>.
#   * To DISABLE an app: prefix the line with "#".
#   * To ENABLE an app:  remove the "#" prefix.
# Flux will prune disabled resources automatically on the next reconcile.
#
# Apps annotated `wip:` still require manual work (missing workload, broken
# upstream chart, etc.) — see docs/applications.md.
# ============================================================================
resources:
  # --- Central config (used by replacements; not emitted to cluster) ----
  - cluster-config.yaml

  # --- Cross-cutting (databases & secrets for apps in this overlay) -----
  - databases
  - db-secrets
  - paperless-ngx.secret.yaml

  # --- Media & Documents ------------------------------------------------
  - ../../base/audiobookshelf
  - ../../base/jellyfin
  - ../../base/kavita
  - ../../base/tandoor
  - ../../base/paperless-ngx
  - ../../base/immich

  # --- Infrastructure & Tools -------------------------------------------
  - ../../base/netbird
  # - ../../base/backrest            # wip: ingress only, no workload
  - ../../base/searxng
  # - ../../base/uptime-kuma         # disabled: dropped from catalog (DR test)
  # - ../../base/unifi-controller    # disabled: dropped from catalog (DR test)

  # --- Cloud & Management -----------------------------------------------
  - ../../base/forgejo
  - ../../base/renovate
  - ../../base/nextcloud
  # - ../../base/linkwarden          # disabled: temporarily removed from catalog
  - ../../base/readeck
  - ../../base/sparkyfitness
  - ../../base/authentik
  - ../../base/homepage

  # --- Network Monitoring -----------------------------------------------
  # - ../../base/speedtest-tracker   # wip: ingress only, no workload
  - ../../base/watchyourlan

  # --- Development / Misc -----------------------------------------------
  - ../../base/teslamate
  - ../../base/goloom
  # - ../../base/pcm                 # wip: ingress only, no workload

  # --- Standalone workloads (already-deployed) --------------------------
  - ../../base/homer
  - ../../base/kite
  - ../../base/sterling-pdf
  - ../../base/monitoring
  - ../../base/n8n

# ============================================================================
# REPLACEMENTS (cluster-config → per-app ingress hosts & TLS settings)
# ----------------------------------------------------------------------------
# Each block below propagates a value from the homelab-cluster-config
# ConfigMap into one or more ingress fields (Ingress or HelmRelease values).
#
# Adding a new app:
#   1. Add `host_<app>: <fqdn>` to cluster-config.yaml.
#   2. Append a target block here referencing the new key.
# ============================================================================
replacements:
  # -------- Per-app hostnames (full-value replacement) ----------------------
  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_audiobookshelf
    targets:
      - select: {kind: Ingress, name: audiobookshelf}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_forgejo
    targets:
      - select: {kind: Ingress, name: forgejo}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_authentik
    targets:
      - select: {kind: Ingress, name: authentik}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_homepage
    targets:
      - select: {kind: Ingress, name: homepage}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_immich
    targets:
      - select: {kind: Ingress, name: immich}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_jellyfin
    targets:
      - select: {kind: Ingress, name: jellyfin}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_kavita
    targets:
      - select: {kind: Ingress, name: kavita}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_paperless
    targets:
      - select: {kind: Ingress, name: paperless}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_readeck
    targets:
      - select: {kind: Ingress, name: readeck}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_sparkyfitness
    targets:
      - select: {kind: Ingress, name: sparkyfitness}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.url_readeck
    targets:
      - select: {kind: Deployment, name: readeck}
        fieldPaths:
          - spec.template.spec.containers.[name=readeck].env.[name=READECK_SERVER_BASE_URL].value

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_readeck
    targets:
      - select: {kind: Deployment, name: readeck}
        fieldPaths:
          - spec.template.spec.containers.[name=readeck].env.[name=READECK_ALLOWED_HOSTS].value

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_sterling_pdf
    targets:
      - select: {kind: HelmRelease, name: sterling-pdf}
        fieldPaths:
          - spec.values.ingress.hosts.0.name
          - spec.values.ingress.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_searxng
    targets:
      - select: {kind: Ingress, name: searxng}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.url_searxng
    targets:
      - select: {kind: Deployment, name: searxng}
        fieldPaths:
          - spec.template.spec.containers.[name=searxng].env.[name=SEARXNG_BASE_URL].value

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_tandoor
    targets:
      - select: {kind: Ingress, name: tandoor}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
      - select: {kind: Deployment, name: tandoor}
        fieldPaths:
          - spec.template.spec.containers.0.startupProbe.httpGet.httpHeaders.[name=Host].value
          - spec.template.spec.containers.0.livenessProbe.httpGet.httpHeaders.[name=Host].value
          - spec.template.spec.containers.0.readinessProbe.httpGet.httpHeaders.[name=Host].value

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.tandoor_allowed_hosts
    targets:
      - select: {kind: Deployment, name: tandoor}
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=ALLOWED_HOSTS].value

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.url_tandoor
    targets:
      - select: {kind: Deployment, name: tandoor}
        fieldPaths:
          - spec.template.spec.containers.0.env.[name=CSRF_TRUSTED_ORIGINS].value

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_watchyourlan
    targets:
      - select: {kind: Ingress, name: watchyourlan}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_goloom
    targets:
      - select: {kind: Ingress, name: goloom}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_teslamate
    targets:
      - select: {kind: Ingress, name: teslamate}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
      - select: {kind: Deployment, name: teslamate}
        fieldPaths:
          - spec.template.spec.containers.[name=teslamate].env.[name=VIRTUAL_HOST].value
      - select: {kind: ConfigMap, name: teslamate-grafana-config}
        fieldPaths:
          - data.GF_SERVER_DOMAIN

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.url_teslamate_grafana
    targets:
      - select: {kind: ConfigMap, name: teslamate-grafana-config}
        fieldPaths:
          - data.GF_SERVER_ROOT_URL

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_nextcloud
    targets:
      - select: {kind: Ingress, name: nextcloud}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_homer
    targets:
      - select: {kind: Ingress, name: homer}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_grafana
    targets:
      - select: {kind: Ingress, name: grafana}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_victoria_metrics
    targets:
      - select: {kind: Ingress, name: victoria-metrics}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_kite
    targets:
      - select: {kind: HelmRelease, name: kite}
        fieldPaths:
          - spec.values.ingress.hosts.0.host
          - spec.values.ingress.tls.0.hosts.0

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.host_n8n
    targets:
      - select: {kind: Ingress, name: n8n}
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
      - select: {kind: HelmRelease, name: n8n}
        fieldPaths:
          - spec.values.main.config.n8n.host

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.url_n8n_webhook
    targets:
      - select: {kind: HelmRelease, name: n8n}
        fieldPaths:
          - spec.values.main.config.n8n.webhook_url
          - spec.values.main.extraEnv.WEBHOOK_URL.value

  # -------- TLS secret names ----------------------------------------------
  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.publicTlsSecret
    targets:
      - select: {kind: Ingress, name: audiobookshelf}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: forgejo}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: homepage}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: jellyfin}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: kavita}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: paperless}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: readeck}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: HelmRelease, name: sterling-pdf}
        fieldPaths: [spec.values.ingress.tls.0.secretName]
      - select: {kind: Ingress, name: searxng}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: immich}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: teslamate}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: authentik}
        fieldPaths: [spec.tls.0.secretName]

  - source:
      kind: ConfigMap
      name: homelab-cluster-config
      fieldPath: data.clusterTlsSecret
    targets:
      - select: {kind: Ingress, name: tandoor}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: goloom}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: nextcloud}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: grafana}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: victoria-metrics}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: n8n}
        fieldPaths: [spec.tls.0.secretName]
      - select: {kind: Ingress, name: watchyourlan}
        fieldPaths: [spec.tls.0.secretName]
