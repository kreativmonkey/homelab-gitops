apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  # Historical name (matches secret homelab-postgres-immich in namespace immich).
  name: homelab-postgres-immich
  namespace: cnpg-system
spec:
  name: immich
  owner: immich
  cluster:
    name: immich-postgres
  extensions:
    - name: cube
      ensure: present
    - name: vchord
      ensure: present
    - name: earthdistance
      ensure: present
