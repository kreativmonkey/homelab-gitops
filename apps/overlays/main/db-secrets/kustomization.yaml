apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - authentik-db-credentials.secret.yaml
  - immich-db-credentials.secret.yaml
  - paperless-db-credentials.secret.yaml
patches:
  - target:
      kind: Secret
      name: authentik-db-credentials
    patch: |
      - op: replace
        path: /metadata/name
        value: homelab-postgres-authentik
      - op: replace
        path: /metadata/namespace
        value: authentik
  - target:
      kind: Secret
      name: immich-db-credentials
    patch: |
      - op: replace
        path: /metadata/name
        value: homelab-postgres-immich
      - op: replace
        path: /metadata/namespace
        value: immich
  - target:
      kind: Secret
      name: paperless-db-credentials
    patch: |
      - op: replace
        path: /metadata/name
        value: homelab-postgres-paperless
      - op: replace
        path: /metadata/namespace
        value: paperless-ngx
