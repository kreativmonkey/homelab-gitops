# Rancher System Upgrade Controller (SUC) — CRD + RBAC + Deployment.
# Upstream manifests include ClusterRole/Role for Plans, node cordon/drain, and Jobs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: system-upgrade
resources:
  - https://github.com/rancher/system-upgrade-controller//manifests?ref=v0.19.2
patches:
  - path: patch-deployment-strategy.yaml
images:
  - name: rancher/system-upgrade-controller
    newTag: v0.19.2
