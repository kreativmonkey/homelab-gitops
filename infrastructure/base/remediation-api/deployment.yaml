apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-api
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: remediation-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: remediation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: remediation-api
    spec:
      serviceAccountName: remediation-api
      automountServiceAccountToken: true
      containers:
        - name: api
          image: python:3.11-alpine
          command:
            - sh
            - -c
            - |
              pip install -q fastapi uvicorn pyjwt kubernetes 2>/dev/null
              exec uvicorn main:app --host 0.0.0.0 --port 8080
          workingDir: /app
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: REMEDIATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: remediation-api-secret
                  key: hmac-secret
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: n8n-integration-credentials
                  key: ntfy-url
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: code
              mountPath: /app
      volumes:
        - name: code
          configMap:
            name: remediation-api
