apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-api
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: remediation-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: remediation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: remediation-api
    spec:
      serviceAccountName: remediation-api
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: pip-install
          image: python:3.14-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
            - pip install --no-cache-dir --target=/packages fastapi uvicorn kubernetes
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: packages
              mountPath: /packages
      containers:
        - name: api
          image: python:3.14-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
            - export PYTHONPATH=/packages:$PYTHONPATH && exec python -m uvicorn main:app --host 0.0.0.0 --port 8080
          workingDir: /app
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: REMEDIATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: remediation-api-secret
                  key: hmac-secret
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: n8n-integration-credentials
                  key: ntfy-url
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: code
              mountPath: /app
            - name: packages
              mountPath: /packages
              readOnly: true
      volumes:
        - name: code
          configMap:
            name: remediation-api
        - name: packages
          emptyDir: {}
