apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-api
  namespace: ai-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: remediation-api
  labels:
    app.kubernetes.io/name: remediation-api
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remediation-api
  labels:
    app.kubernetes.io/name: remediation-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: remediation-api
subjects:
  - kind: ServiceAccount
    name: remediation-api
    namespace: ai-ops
