apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector-system
spec:
  interval: 1h
  targetNamespace: reflector-system
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: reflector
      version: "10.0.55"
      sourceRef:
        kind: HelmRepository
        name: emberstack-repo
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
