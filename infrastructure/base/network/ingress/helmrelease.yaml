apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress
  namespace: ingress-nginx
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/cert-manager/cert-manager
spec:
  interval: 1h
  targetNamespace: ingress-nginx
  chart:
    spec:
      chart: nginx-ingress
      version: "2.5.0"
      sourceRef:
        kind: HelmRepository
        name: nginx-ingress-oci
        namespace: flux-system
  values:
    controller:
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      kind: daemonset
      priorityClassName: "homelab-infrastructure"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi
      service:
        type: ClusterIP
    prometheus:
      create: true
      port: 9113
