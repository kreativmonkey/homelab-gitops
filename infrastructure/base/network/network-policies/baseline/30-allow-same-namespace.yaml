apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # Pods within the same namespace may talk to each other freely
  # (app <-> its sidecar/redis/worker in the same namespace).
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
