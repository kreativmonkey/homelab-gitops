apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/longhorn-system/longhorn
spec:
  interval: 1h
  targetNamespace: velero
  chart:
    spec:
      chart: velero
      version: "6.0.1"
      sourceRef:
        kind: HelmRepository
        name: velero-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    configuration:
      provider: aws
      backupStorageLocation:
        name: default
        bucket: velero
        config:
          region: us-east-1
          s3Url: http://192.168.10.94:30186
          insecureSkipTLSVerify: "true"
          s3ForcePathStyle: "true"
      volumeSnapshotLocation:
        name: default
        config:
          region: us-east-1
      features: EnableCSI
      restic:
        enabled: true
    credentials:
      existingSecret: velero-credentials
    deployRestic:
      enabled: true
    restic:
      priorityClassName: "homelab-infrastructure"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    velero:
      priorityClassName: "homelab-infrastructure"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8085"

