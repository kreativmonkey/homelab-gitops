# Datei: infrastructure/storage/longhorn/release.yaml
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn-repo
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: "1.6.0" # Zielversion für Renovate Bot
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
        namespace: flux-system
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3 # Daten liegen auf 3 von 4 Nodes
    
    # PriorityClass für Storage-Infrastruktur anwenden
    priorityClass: "homelab-infrastructure"
    
    # Talos-spezifische Pfad-Anpassungen (falls nötig, oft Auto-Detect)
    csi:
      kubeletRootDir: /var/lib/kubelet