apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  targetNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: "1.6.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    persistence:
      defaultClass: false
      defaultDataPath: /var/lib/longhorn
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      replicaCount: 2
    longhornManager:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
