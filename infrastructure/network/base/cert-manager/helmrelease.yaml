apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.14.4"
      sourceRef:
        kind: HelmRepository
        name: jetstack-repo
        namespace: flux-system
  install:
    crds: CreateReplace
  values:
    installCRDs: true
    global:
      priorityClassName: "homelab-infrastructure"
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-hetzner
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager-webhook-hetzner
      version: "0.6.5"
      sourceRef:
        kind: HelmRepository
        name: hetzner-webhook-repo
        namespace: flux-system
  dependsOn:
    - name: cert-manager
