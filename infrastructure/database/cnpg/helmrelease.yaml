apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/longhorn-system/longhorn
spec:
  interval: 1h
  targetNamespace: cnpg-system
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.27.1"
      sourceRef:
        kind: HelmRepository
        name: cnpg-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    config:
      clusterWide: true
    monitoring:
      enabled: true
    image:
      repository: ghcr.io/cloudnative-pg/cloudnative-pg
      tag: "1.28.1"
    serviceAccount:
      create: true
    crds:
      create: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
