# Talos OS upgrade Plan for Rancher System Upgrade Controller.
# Fully automatic: triggers on all nodes as soon as Renovate bumps the version.
#
# Installer image must match homelab-infrastructure/talos (main.tf machine.install.image):
# factory.talos.dev/nocloud-installer/<talos_schematic_id>:<talos_version>
# Schematic ID: homelab-infrastructure/talos/cluster.auto.tfvars → talos_schematic_id
---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: talos
  namespace: system-upgrade
  labels:
    # SUC copies Plan labels to upgrade Jobs. Do not reuse the controller name:
    # the controller Deployment has required podAntiAffinity for that workload.
    app.kubernetes.io/name: talos-upgrade
    app.kubernetes.io/component: talos-upgrade
spec:
  # One node at a time — safe for 3-node stacked control-plane.
  concurrency: 1
  # No `exclusive: true`: it adds a required pod-anti-affinity against other
  # `upgrade.cattle.io/exclusive` pods, which deadlocks the last node — the upgrade
  # job for the node running system-upgrade-controller stays Pending, and that job
  # is exactly what would drain/relocate the controller (circular). With a single
  # plan and concurrency 1 the exclusivity is redundant.
  serviceAccountName: system-upgrade
  # 1h timeout: drain (10min) + talosctl upgrade + reboot + node rejoin.
  jobActiveDeadlineSecs: 3600
  version: v1.13.6 # renovate: datasource=github-releases depName=siderolabs/talos versioning=semver
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  cordon: true
  # talosconfig (client mTLS) for the upgrade job's apid call. Provisioned by
  # Terraform (homelab-infrastructure/talos/envs/homelab-kube/system-upgrade.tf),
  # not committed here — it is regenerated on every cluster deployment.
  secrets:
    - name: talosconfig
      path: /var/run/secrets/talos.dev
  drain:
    force: true
    ignoreDaemonSets: true
    deleteLocalData: true
    timeout: 600s
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/etcd
      operator: Exists
      effect: NoExecute
    - key: CriticalAddonsOnly
      operator: Exists
  upgrade:
    # Direct /talosctl binary: talosctl image is scratch-based (no shell).
    # $(SYSTEM_UPGRADE_PLAN_LATEST_VERSION) expanded by K8s, not shell.
    # Connects to the node's own apid over TCP and authenticates via mTLS using the
    # talosconfig secret (--insecure / maintenance API only works pre-boot, never on
    # a running node).
    # The job runs hostNetwork=true on the target node, so NODE_IP (downward API
    # status.hostIP) is the local apid. We use it for BOTH the endpoint (-e) and the
    # target node (-n): the apid serving cert is valid for the node IP, but not for
    # "localhost" — so the Unix socket endpoint fails TLS verification in this
    # authenticated mode (it only worked with --insecure, which skips it).
    # Keep schematic ID in sync with homelab-infrastructure/talos/cluster.auto.tfvars
    # renovate: datasource=github-releases depName=siderolabs/talos versioning=semver
    image: ghcr.io/siderolabs/talosctl:v1.13.6
    envs:
      - name: NODE_IP
        valueFrom:
          fieldRef:
            fieldPath: status.hostIP
    command:
      - /talosctl
    args:
      - --talosconfig=/var/run/secrets/talos.dev/talosconfig
      - -e
      - $(NODE_IP)
      - -n
      - $(NODE_IP)
      - upgrade
      - --image=factory.talos.dev/nocloud-installer/10f9392d7091b30abf573524649756e5bc894f653af525836e9ab0297f301fc2:$(SYSTEM_UPGRADE_PLAN_LATEST_VERSION)
      - --drain=false
      - --wait=false
      - --timeout=15m
    securityContext:
      privileged: true
