apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: cnpg-system
  labels:
    app.kubernetes.io/name: homelab-postgres
    app.kubernetes.io/managed-by: cnpg
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/cnpg-system/cnpg
spec:
  description: "Homelab PostgreSQL cluster"
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  instances: 1

  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: 64MB
      effective_cache_size: 256MB

  storage:
    storageClass: longhorn
    size: 10Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

  monitoring:
    enablePodMonitor: true

  affinity:
    podAntiAffinityType: preferred

  # Continuous backup: base backups + WAL archive to S3-compatible object store
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/homelab-postgres
      endpointURL: https://192.168.10.94:30292
      serverName: homelab-postgres
      s3Credentials:
        accessKeyId:
          name: cnpg-barman-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-barman-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
    retentionPolicy: 30d

  # Application roles (passwords in auto-generated or referenced Secrets)
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        passwordSecret:
          name: authentik-db-credentials
      - name: paperless
        ensure: present
        login: true
        passwordSecret:
          name: paperless-db-credentials
      - name: tandoor
        ensure: present
        login: true
        passwordSecret:
          name: tandoor-db-credentials
      - name: nextcloud
        ensure: present
        login: true
        passwordSecret:
          name: nextcloud-db-credentials
      - name: linkwarden
        ensure: present
        login: true
        passwordSecret:
          name: linkwarden-db-credentials
      - name: teslamate
        ensure: present
        login: true
        passwordSecret:
          name: teslamate-db-credentials
