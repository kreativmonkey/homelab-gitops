apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: cnpg-system
  labels:
    app.kubernetes.io/name: homelab-postgres
    app.kubernetes.io/managed-by: cnpg
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/cnpg-system/cnpg
spec:
  description: "Homelab PostgreSQL cluster"
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql versioning=loose
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  instances: 1

  postgresql:
    parameters:
      # Shared by many apps (Authentik, TeslaMate, SparkyFitness, …). 50 was exhausted
      # (SparkyFitness alone: owner + app + Better Auth pools up to ~30 per replica).
      max_connections: "100"
      shared_buffers: 64MB
      effective_cache_size: 256MB

  storage:
    storageClass: truenas-iscsi
    size: 10Gi

  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      memory: 1Gi

  monitoring:
    # Metrics scraped via apps/base/monitoring/extra-scrapes/cnpg-vmpodscrape.yaml
    enablePodMonitor: false

  affinity:
    podAntiAffinityType: preferred

  env:
    - name: AWS_DEFAULT_REGION
      value: garage
    - name: AWS_REGION
      value: garage

  # Continuous backup: base backups + WAL archive to S3-compatible object store
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/homelab-postgres
      endpointURL: http://192.168.10.94:30188
      serverName: homelab-postgres
      s3Credentials:
        accessKeyId:
          name: cnpg-barman-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-barman-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
    retentionPolicy: 30d

  # Application roles (passwords in auto-generated or referenced Secrets)
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        passwordSecret:
          name: authentik-db-credentials
      - name: paperless
        ensure: present
        login: true
        passwordSecret:
          name: paperless-db-credentials
      - name: tandoor
        ensure: present
        login: true
        passwordSecret:
          name: tandoor-db-credentials
      - name: nextcloud
        ensure: present
        login: true
        passwordSecret:
          name: nextcloud-db-credentials
      - name: linkwarden
        ensure: present
        login: true
        passwordSecret:
          name: linkwarden-db-credentials
      - name: teslamate
        ensure: present
        login: true
        # TeslaMate migrations require superuser for earthdistance/cube extensions.
        superuser: true
        passwordSecret:
          name: teslamate-db-credentials
      - name: goloom
        ensure: present
        login: true
        passwordSecret:
          name: goloom-db-credentials
      - name: forgejo
        ensure: present
        login: true
        passwordSecret:
          name: forgejo-db-credentials
      - name: sparkyfitness
        ensure: present
        login: true
        # Migrations grant pg_stat_statements_reset and manage roles/extensions on first start.
        superuser: true
        passwordSecret:
          name: sparkyfitness-db-credentials
      - name: sparkyfitness_app
        ensure: present
        login: true
        passwordSecret:
          name: sparkyfitness-app-db-credentials
      - name: outline
        ensure: present
        login: true
        passwordSecret:
          name: outline-db-credentials
