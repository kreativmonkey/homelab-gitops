apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: cnpg-system
  labels:
    app.kubernetes.io/name: homelab-postgres
    app.kubernetes.io/managed-by: cnpg
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/cnpg-system/cnpg
spec:
  description: "Homelab PostgreSQL cluster"
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql versioning=loose
  imageName: ghcr.io/cloudnative-pg/postgresql:19beta1-system-trixie

  # HA across the 3 Talos nodes. CNPG auto-creates a minAvailable:2 PDB at >=2
  # instances, so a node drain (system-upgrade-controller) evicts one replica at
  # a time with failover instead of taking the database down.
  instances: 3

  postgresql:
    parameters:
      # Shared by many apps (Authentik, TeslaMate, SparkyFitness, …). 50 was exhausted
      # (SparkyFitness alone: owner + app + Better Auth pools up to ~30 per replica).
      max_connections: "100"
      # Write-smoothing while the DB zvols live on a shared (contended) Proxmox SSD with
      # no dedicated DB SSD yet. A bigger cache cuts read I/O; less frequent, spread-out
      # checkpoints shrink the FUA/fsync write bursts that stall under cross-VM contention,
      # exceed the 30s SCSI cmd timeout and surface as -EIO -> Postgres abort -> CNPG
      # failover cascade. See memory truenas-iscsi-spof-storage-incident; real fix = own SSD.
      shared_buffers: 256MB
      effective_cache_size: 768MB
      max_wal_size: "2GB"
      min_wal_size: "256MB"
      checkpoint_timeout: "15min"
      checkpoint_completion_target: "0.9"

  storage:
    # Node-local storage (see local-path-provisioner): CNPG replicates at the DB
    # layer, so local-path is faster and removes the truenas-iscsi SPOF from the DB
    # path. storageClass applies to NEW instances; existing iscsi PVCs are migrated
    # by rolling instance replacement (delete pod+PVC -> CNPG re-bootstraps locally).
    storageClass: local-path
    size: 10Gi

  resources:
    requests:
      cpu: 50m
      # Raised with shared_buffers 64MB->256MB: 256MB SB + up to 100 conns*work_mem made the
      # old 1Gi limit OOM-prone (see KubePodOOMKilled band-aid #313). 2Gi gives headroom.
      memory: 768Mi
    limits:
      memory: 2Gi

  monitoring:
    # Metrics scraped via apps/base/monitoring/extra-scrapes/cnpg-vmpodscrape.yaml
    enablePodMonitor: false

  affinity:
    # required (hard): exactly one instance per node across the 3 Talos nodes. A node
    # drain (autonomous Talos/SUC upgrade) then only ever evicts ONE instance of this
    # cluster — a single clean switchover instead of a cascading failover storm.
    # Trade-off: while a node is down/cordoned the 3rd instance stays Pending (2/3 HA)
    # until it returns — expected and safe.
    podAntiAffinityType: required

  # Ride out transient primary blips (e.g. node-reboot network flap) for 30s before
  # failing over, instead of reacting instantly (default 0).
  failoverDelay: 30

  env:
    - name: AWS_DEFAULT_REGION
      value: garage
    - name: AWS_REGION
      value: garage

  # Continuous backup: base backups + WAL archive to S3-compatible object store
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/homelab-postgres
      endpointURL: http://192.168.10.94:30188
      serverName: homelab-postgres
      s3Credentials:
        accessKeyId:
          name: cnpg-barman-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-barman-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
    retentionPolicy: 30d

  # Application roles (passwords in auto-generated or referenced Secrets)
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        passwordSecret:
          name: authentik-db-credentials
      - name: paperless
        ensure: present
        login: true
        passwordSecret:
          name: paperless-db-credentials
      - name: tandoor
        ensure: present
        login: true
        passwordSecret:
          name: tandoor-db-credentials
      - name: nextcloud
        ensure: present
        login: true
        passwordSecret:
          name: nextcloud-db-credentials
      - name: linkwarden
        ensure: present
        login: true
        passwordSecret:
          name: linkwarden-db-credentials
      - name: teslamate
        ensure: present
        login: true
        # TeslaMate migrations require superuser for earthdistance/cube extensions.
        superuser: true
        passwordSecret:
          name: teslamate-db-credentials
      - name: goloom
        ensure: present
        login: true
        passwordSecret:
          name: goloom-db-credentials
      - name: forgejo
        ensure: present
        login: true
        passwordSecret:
          name: forgejo-db-credentials
      - name: sparkyfitness
        ensure: present
        login: true
        # Migrations grant pg_stat_statements_reset and manage roles/extensions on first start.
        superuser: true
        passwordSecret:
          name: sparkyfitness-db-credentials
      - name: sparkyfitness_app
        ensure: present
        login: true
        passwordSecret:
          name: sparkyfitness-app-db-credentials
      - name: outline
        ensure: present
        login: true
        passwordSecret:
          name: outline-db-credentials
