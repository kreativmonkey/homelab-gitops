# Dedicated PostgreSQL for Immich — requires VectorChord (vchord), not stock CNPG image.
# See: https://github.com/immich-app/immich-charts/blob/main/local/cloudnative-pg.yaml
#      https://docs.immich.app/administration/postgres-standalone
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: cnpg-system
  labels:
    app.kubernetes.io/name: immich-postgres
    app.kubernetes.io/managed-by: cnpg
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/cnpg-system/cnpg
spec:
  description: "Immich PostgreSQL with VectorChord"
  # renovate: datasource=docker depName=ghcr.io/tensorchord/cloudnative-vectorchord versioning=loose
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.13
  # HA across the 3 Talos nodes; CNPG auto-creates a minAvailable:2 PDB at >=2
  # instances so node drains evict one replica at a time with failover.
  instances: 3

  postgresql:
    shared_preload_libraries:
      - vchord.so
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
      effective_cache_size: 512MB

  storage:
    # Node-local storage (see local-path-provisioner): CNPG replicates at the DB
    # layer, so local-path is faster and removes the truenas-iscsi SPOF from the DB
    # path. storageClass applies to NEW instances; existing iscsi PVCs are migrated
    # by rolling instance replacement (delete pod+PVC -> CNPG re-bootstraps locally).
    storageClass: local-path
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi

  monitoring:
    # Metrics scraped via apps/base/monitoring/extra-scrapes/cnpg-vmpodscrape.yaml
    enablePodMonitor: false

  affinity:
    # required (hard): exactly one instance per node across the 3 Talos nodes. A node
    # drain (autonomous Talos/SUC upgrade) then only ever evicts ONE instance of this
    # cluster — a single clean switchover instead of a cascading failover storm.
    # Default was "preferred" (soft), which let 2 instances co-locate on one node.
    podAntiAffinityType: required

  # Ride out transient primary blips (e.g. node-reboot network flap) for 30s before
  # failing over, instead of reacting instantly (default 0).
  failoverDelay: 30

  env:
    - name: AWS_DEFAULT_REGION
      value: garage
    - name: AWS_REGION
      value: garage

  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/immich-postgres
      endpointURL: http://192.168.10.94:30188
      serverName: immich-postgres
      s3Credentials:
        accessKeyId:
          name: cnpg-barman-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-barman-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
    retentionPolicy: 30d

  managed:
    roles:
      - name: immich
        ensure: present
        login: true
        passwordSecret:
          name: immich-db-credentials
