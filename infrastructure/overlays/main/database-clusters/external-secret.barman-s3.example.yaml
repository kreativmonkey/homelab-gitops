# Optional: External Secrets instead of SOPS (requires ClusterSecretStore "homelab-vault")
# Rename to external-secret.barman-s3.yaml and configure your provider.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-barman-s3-credentials
  namespace: cnpg-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: homelab-vault
  target:
    name: cnpg-barman-s3-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        ACCESS_KEY_ID: "{{ .accessKeyId }}"
        ACCESS_SECRET_KEY: "{{ .secretAccessKey }}"
  data:
    - secretKey: accessKeyId
      remoteRef:
        key: homelab/cnpg/barman-s3
        property: accessKeyId
    - secretKey: secretAccessKey
      remoteRef:
        key: homelab/cnpg/barman-s3
        property: secretAccessKey
