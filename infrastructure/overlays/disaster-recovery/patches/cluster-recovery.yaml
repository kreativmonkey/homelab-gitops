# Strategic merge: bootstrap from latest Barman backup in S3 (see docs/disaster-recovery/cnpg-s3-dr.md)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: cnpg-system
  annotations:
    # Restore into same S3 prefix/serverName as production backups (see cnpg-s3-dr.md)
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  bootstrap:
    recovery:
      source: homelab-postgres
  externalClusters:
    - name: homelab-postgres
      barmanObjectStore:
        destinationPath: s3://cnpg-backups/homelab-postgres
        endpointURL: http://192.168.10.94:30188
        serverName: homelab-postgres
        s3Credentials:
          accessKeyId:
            name: cnpg-barman-s3-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-barman-s3-credentials
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
          maxParallel: 4
