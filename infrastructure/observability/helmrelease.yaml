apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: cert-manager.io/Certificate/cert-manager/wildcard-f4mily-net
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.33.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    
    server:
      persistentVolume:
        enabled: true
        storageClass: "longhorn"
        size: 10Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 250m
          memory: 512Mi
    
    vmagent:
      enabled: true
      selectors:
        - release: victoriametrics
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

