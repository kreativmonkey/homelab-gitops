apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/depends-on: helm.toolkit.fluxcd.io/HelmRelease/kube-system/metrics-server
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "61.0.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    prometheus:
      enabled: true
      prometheusSpec:
        serviceMonitorSelector:
          matchLabels:
            release: victoriametrics
        serviceMonitorNamespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring
        remoteWrite:
          - url: http://vm-vm-metrics-server.monitoring:8428/api/v1/write
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
    alertmanager:
      enabled: false
    grafana:
      enabled: false
    prometheusOperator:
      enabled: true
      createPrometheusResource: false
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    kubeStateMetrics:
      enabled: false
    nodeExporter:
      enabled: false
