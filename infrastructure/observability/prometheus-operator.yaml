apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator
  namespace: monitoring
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.10.5"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    prometheus:
      enabled: true
      prometheusSpec:
        serviceMonitorSelector:
          matchLabels:
            release: victoriametrics
        serviceMonitorNamespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring
        remoteWrite:
          - url: http://monitoring-vm-victoria-metrics-single-server.monitoring:8428/api/v1/write
        resources:
          requests:
            cpu: 20m
            memory: 128Mi
          limits:
            cpu: 100m
            memory: 256Mi
    alertmanager:
      enabled: false
    grafana:
      enabled: false
    prometheusOperator:
      enabled: true
      createPrometheusResource: false
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    kubeStateMetrics:
      enabled: false
    nodeExporter:
      enabled: false
