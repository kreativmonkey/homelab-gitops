apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator
  namespace: monitoring
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "61.0.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-repo
        namespace: flux-system
  values:
    global:
      priorityClassName: "homelab-infrastructure"
    prometheus:
      enabled: false
    alertmanager:
      enabled: false
    grafana:
      enabled: false
    prometheusOperator:
      enabled: true
      createPrometheusResource: false
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    kubeStateMetrics:
      enabled: false
    nodeExporter:
      enabled: false
