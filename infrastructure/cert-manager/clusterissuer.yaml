apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: kreativmonkey@calyrium.org # Zwingend anpassen für Ablaufwarnungen
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - dns01:
          hetzner:
             apiTokenSecretRef:
              name: hetzner-api-token-secret
              key: api-token