apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack-repo
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.jetstack.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "v1.14.4" # Zielversion für Renovate Bot
      sourceRef:
        kind: HelmRepository
        name: jetstack-repo
        namespace: flux-system
  values:
    installCRDs: true
    # PriorityClass für Systemkomponenten
    global:
      priorityClassName: "homelab-infrastructure"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi